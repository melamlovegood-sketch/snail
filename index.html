/* ---------------- 自然语言操作识别 ---------------- */
const OPERATION_KW = /(?:推到|挪到|顺延|改成|改为|压缩|删除所有|今天不做|不做了|改时长|调整到|清空)/;

function isOperationCommand(text) {
  return OPERATION_KW.test(text);
}

function handleTextInput(text) {
  text = text.trim();
  if (!text) return;

  // 操作指令优先：检测到关键词且有 API Key → 交给 AI 解析为 actions
  if (isOperationCommand(text)) {
    if (!getApiKey()) {
      toast('操作指令需要先配置 API Key');
      return;
    }
    callOperationAPI(text);
    return;
  }

  const parsed = parseTaskText(text);
  if (parsed.length === 0) { toast('没解析到任务'); return; }

  // 处理循环
  if (parsed[0].type === 'recur') {
    const r = parsed[0];
    const tpl = {
      id: uid(),
      desc: r.desc,
      cat: r.cat,
      priority: r.priority,
      durPlan: r.durPlan,
      startTime: r.startTime || null,
      days: r.days,
      createdAt: todayStr()
    };
    state.recurTemplates.push(tpl);
    dailyTick();
    render();
    toast(`已创建循环任务：${r.desc}`);
    return;
  }

  // 检查是否需要确认时长
  const needConfirm = parsed.filter(p => p.needConfirmDur);
  if (needConfirm.length > 0) {
    showDurationConfirmModal(parsed);
  } else {
    parsed.forEach(p => state.tasks.push(makeTask(p)));
    saveState();
    render();
    toast(`已添加 ${parsed.length} 个任务`);
  }
}

function showDurationConfirmModal(parsed) {
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `
    <h2>确认任务时长</h2>
    <p class="text-soft text-sm" style="margin-bottom:16px">未识别到时长，已为你估算，可调整后确认。</p>
    <div id="dur-list"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="cancel-dur">取消</button>
      <button class="btn-primary" id="confirm-dur">添加</button>
    </div>
  `;
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);

  const list = modal.querySelector('#dur-list');
  parsed.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'modal-list-item';
    row.innerHTML = `
      <input type="checkbox" checked data-i="${i}">
      <div style="flex:1; min-width:0">
        <div style="font-weight:500">${escapeHtml(p.desc)}</div>
        <div class="text-xs text-soft">${fmtDate(p.date)}${p.startTime ? ' · '+p.startTime : ''} · ${p.cat}</div>
      </div>
      <input type="number" min="5" step="5" value="${p.durPlan ?? p.estimatedDur ?? 60}" style="width:70px" data-dur="${i}">
      <span class="text-xs text-soft">分</span>
    `;
    list.appendChild(row);
  });

  modal.querySelector('#cancel-dur').onclick = () => backdrop.remove();
  modal.querySelector('#confirm-dur').onclick = () => {
    let added = 0;
    parsed.forEach((p, i) => {
      const cb = modal.querySelector(`[data-i="${i}"]`);
      const dur = parseInt(modal.querySelector(`[data-dur="${i}"]`).value) || 60;
      if (cb.checked) {
        p.durPlan = dur;
        state.tasks.push(makeTask(p));
        added++;
      }
    });
    saveState();
    backdrop.remove();
    render();
    toast(`已添加 ${added} 个任务`);
  };
  backdrop.addEventListener('click', e => {
    if (e.target === backdrop) backdrop.remove();
  });
}

function classifyImportItem(it) {
  if (it.isRecur) return 'recur';
  const today = todayStr();
  const d = it.date || today;
  if (d <= dateAdd(today, 1)) return 'urgent';        // 今天/明天/过期
  if (d <= dateAdd(today, 7)) return 'week';
  return 'later';
}

function showImportGroupedModal(tasks, summary) {
  const groups = { urgent: [], week: [], later: [], recur: [] };

function findTask(id) {
  return state.tasks.find(t => t.id === id) || state.done.find(t => t.id === id);
}

/* ---------------- 计时器 ---------------- */
function startTimer(taskId) {
  const t = findTask(taskId);
  if (!t) return;
  if (t.timerState === 'idle') {
    t.timerStart = Date.now();
    t.timerPaused = 0;
    t.timerState = 'running';
  } else if (t.timerState === 'paused') {
    t.timerStart = Date.now() - t.timerPaused;
    t.timerState = 'running';
  }
  saveState();
  render();
}
function pauseTimer(taskId) {
  const t = findTask(taskId);
  if (!t || t.timerState !== 'running') return;
  t.timerPaused = Date.now() - t.timerStart;
  t.timerState = 'paused';
  saveState();
  render();
}
function stopTimer(taskId) {
  const t = findTask(taskId);
  if (!t) return;
  let elapsed = 0;
  if (t.timerState === 'running') elapsed = Date.now() - t.timerStart;
  else if (t.timerState === 'paused') elapsed = t.timerPaused;
  // 不足 60s 视为误点（点开播放又秒停），重置回 idle，不污染 durActual
  if (elapsed < 60000) {
    t.timerStart = null;
    t.timerPaused = 0;
    t.timerState = 'idle';
    saveState();
    render();
    return;
  }
  t.durActual = Math.round(elapsed / 60000);
  t.timerState = 'done';
  saveState();
  render();
}
function getTimerElapsed(t) {
  if (t.timerState === 'running') return Date.now() - t.timerStart;
  if (t.timerState === 'paused') return t.timerPaused;
  return 0;
}
function startTimerTick() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    // 只更新计时显示，不重渲染整个视图
    document.querySelectorAll('[data-timer-display]').forEach(el => {
      const id = el.dataset.timerDisplay;
      const t = findTask(id);
      if (t && t.timerState === 'running') {
        el.textContent = fmtTimer(getTimerElapsed(t));
      }
    });
  }, 1000);
}

/* ---------------- 完成任务 ---------------- */
function toggleComplete(taskId) {
  let idx = state.tasks.findIndex(t => t.id === taskId);
  if (idx >= 0) {
    const t = state.tasks[idx];
    // 如果计时未停止，自动结束
    if (t.timerState === 'running' || t.timerState === 'paused') {
      let elapsed = t.timerState === 'running' ? Date.now() - t.timerStart : t.timerPaused;
      // 计时不足 60s 视为未真正使用计时器，按计划时长记录，避免出现 "1h30m → 1分钟" 这种异常显示
      t.durActual = elapsed >= 60000 ? Math.round(elapsed / 60000) : (t.durActual != null ? t.durActual : t.durPlan);
    } else if (t.durActual == null) {
      t.durActual = t.durPlan;
    }
    t.timerState = 'done';
    // 完成时清零拖延计数和 sortOrder
    t.rolloverCount = 0;
    t.rollover = false;
    t.sortOrder = null;
    // 循环任务：记录完成日志
    if (t.recurId) {
      state.recurDoneLog[`${t.recurId}_${t.date}`] = { actual: t.durActual, ts: Date.now() };
    }
    state.tasks.splice(idx, 1);
    state.done.push(t);
    // 完成的任务在云端软删除（next 同步周期 done 不再上推）
    cloudSoftDelete(t.id);
    // 仅当任务属于今日时计入里程
    if (t.date === todayStr()) {
      awardMileageOnComplete(t);
    }
    // 如果是专注任务，延迟 800ms 移出专注区块（保留完成动效）
    if (focusPins.includes(t.id)) {
      setTimeout(() => {
        focusPins = focusPins.filter(id => id !== t.id);
        saveFocusPins();
        render();
      }, 800);
    }
  } else {
    idx = state.done.findIndex(t => t.id === taskId);
    if (idx >= 0) {
      const t = state.done[idx];
      t.timerState = 'idle';
      if (t.recurId) {
        delete state.recurDoneLog[`${t.recurId}_${t.date}`];
      }
      state.done.splice(idx, 1);
      state.tasks.push(t);
      if (t.date === todayStr()) recomputeDailyRate();
    }
  }
  saveState();
  render();
  // 状态切换动画：在 render 之后，蜗牛 SVG 容器仍是同一个 DOM
  updateSnailStatus();
}

/* ---------------- 删除任务 ---------------- */
function deleteTask(taskId) {
  state.tasks = state.tasks.filter(t => t.id !== taskId);
  state.done = state.done.filter(t => t.id !== taskId);
  saveState();
  cloudSoftDelete(taskId);
  render();
}

        tplRef.priority = t.priority;
        tplRef.durPlan = t.durPlan;
        tplRef.startTime = t.startTime;
        tplRef.notes = t.notes;
        const today = todayStr();
        state.tasks.forEach(other => {
          if (other.recurId === tplRef.id && other.id !== t.id && other.date >= today && other.timerState !== 'done') {
            other.desc = t.desc;
            other.cat = t.cat;
            other.priority = t.priority;
            other.durPlan = t.durPlan;
            other.startTime = t.startTime;
            other.notes = t.notes;
            syncedCount++;
          }
        });
      }
    }

    saveState();
    close();
    render();
    toast(syncedCount > 0 ? `已保存，同步 ${syncedCount} 个未来实例` : '已保存');
  };

  // 点击模态外部关闭
  backdrop.addEventListener('click', e => {
    if (e.target === backdrop) close();
  });
}

function favoriteTask(taskId) {
  const t = findTask(taskId);
  if (!t) return;

  // 已收藏 → 取消（按 favoriteId 链接，比 desc+cat 匹配更稳健）
  if (t.favoriteId && state.favorites.some(f => f.id === t.favoriteId)) {
    state.favorites = state.favorites.filter(f => f.id !== t.favoriteId);
    t.favoriteId = null;
    saveState();
    render();
    toast('已取消收藏');
    return;
  }

  // 未收藏 → 加入。若 desc+cat 已存在同内容收藏则复用其 id，避免重复
  let existing = state.favorites.find(f => f.desc === t.desc && f.cat === t.cat);
  if (!existing) {
    existing = {
      id: uid(),
      desc: t.desc,
      cat: t.cat,
      priority: t.priority,
      durPlan: t.durPlan
    };
    state.favorites.push(existing);
  }
  t.favoriteId = existing.id;
  saveState();
  render();
  toast('已收藏');
}

function addFromFavorite(favId) {
  const f = state.favorites.find(x => x.id === favId);

/* ---------------- 渲染 ---------------- */
const PRI_ORDER = { 'urgent-important': 0, 'urgent-unimportant': 1, 'important': 2, 'normal': 3 };
function sortTasks(arr) {
  return arr.slice().sort((a, b) => {
    // AI 早间规划的 sortOrder 优先（双方都有时直接比较；单方有时排前）
    if (a.sortOrder != null && b.sortOrder != null) return a.sortOrder - b.sortOrder;
    if (a.sortOrder != null) return -1;
    if (b.sortOrder != null) return 1;

    const pa = PRI_ORDER[a.priority] ?? 9;
    const pb = PRI_ORDER[b.priority] ?? 9;
    if (pa !== pb) return pa - pb;
    // 同优先级：startTime 升序，没有 startTime 的排在最后；都无时间则按创建时间升序
    const ta = a.startTime || null;
    const tb = b.startTime || null;
    if (ta && tb) return ta.localeCompare(tb);
    if (ta && !tb) return -1;
    if (!ta && tb) return 1;
    const ca = a.createdAt || 0;
    const cb = b.createdAt || 0;
    return ca - cb;
  });
}

function deadlineTag(deadline) {
  if (!deadline) return '';
  const d = diffDays(todayStr(), deadline);
  let cls = '';
  let text = '';
  if (d < 0) { cls = 'overdue'; text = `已过期 ${Math.abs(d)}天`; }
  else if (d === 0) { cls = 'danger'; text = '今日截止'; }
  else if (d <= 3) { cls = 'danger'; text = `${d}天后截止`; }
  else if (d <= 7) { cls = 'warn'; text = `${d}天后截止`; }
  else { text = `${d}天后截止`; }
  return `<span class="deadline-tag ${cls}">${text}</span>`;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtRecurDays(days) {
  if (!Array.isArray(days) || days.length === 0) return '';
  if (days.length === 7) return '每天';
  const names = ['日','一','二','三','四','五','六'];
  return '每周 ' + days.slice().sort().map(d => names[d]).join('、');
}

function computeStreak(tplId) {
  const tpl = state.recurTemplates.find(t => t.id === tplId);
  if (!tpl || !Array.isArray(tpl.days) || tpl.days.length === 0) return 0;
  let streak = 0;
  for (let i = 0; i < 365; i++) {
    const d = dateAdd(todayStr(), -i);
    const wd = weekday(d);
    if (!tpl.days.includes(wd)) continue;
    if (state.recurDoneLog[`${tpl.id}_${d}`]) streak++;
    else { if (i === 0) continue; break; }
  }
  return streak;
}

function computeMaxStreak() {
  if (state.recurTemplates.length === 0) return 0;
  let max = 0;
  state.recurTemplates.forEach(tpl => {
    let streak = 0;
    for (let i = 0; i < 365; i++) {
      const d = dateAdd(todayStr(), -i);
      const wd = weekday(d);
      if (!tpl.days.includes(wd)) continue;
      if (state.recurDoneLog[`${tpl.id}_${d}`]) {
        streak++;
      } else {
        // 今天还没完成不算断
        if (i === 0) continue;
        break;
      }
    }
    if (streak > max) max = streak;
  });
  return max;
}

async function checkMorningPlan() {
  const today = todayStr();
  if (state.lastMorningPlanDate === today) return;
  const todayPending = state.tasks.filter(t => t.date === today && t.timerState !== 'done');
  if (todayPending.length < 3) return;

  const apiKey = getApiKey();
  if (!apiKey) {
    morningPlan = { noKey: true };
    render();
    return;
  }

  morningPlan = { loading: true };
  render();

  // 历史完成率：最近 7 天
  const today_d = todayStr();
  const recent7 = [];
  for (let i = 1; i <= 7; i++) {
    const d = dateAdd(today_d, -i);
    const dayTasks = [...state.tasks, ...state.done].filter(t => t.date === d || t.originalDate === d);
    const doneCount = dayTasks.filter(t => state.done.some(x => x.id === t.id)).length;
    recent7.push({ date: d, total: dayTasks.length, done: doneCount });
  }

  const taskList = todayPending.map(t => ({
    id: t.id,
    desc: t.desc,
    cat: t.cat,
    priority: t.priority,
    startTime: t.startTime,
    durPlan: t.durPlan,
    deadline: t.deadline,
    rolloverCount: t.rolloverCount || 0
  }));

function deepClone(v) { return JSON.parse(JSON.stringify(v)); }

function applyOperations(actions, summary) {
  // 先快照便于撤销
  const snapshot = {
    tasks: deepClone(state.tasks),
    done: deepClone(state.done),
    recurTemplates: deepClone(state.recurTemplates),
    favorites: deepClone(state.favorites)
  };

  let applied = 0;
  for (const action of actions) {
    if (!action || !action.op) continue;
    if (action.op === 'delete' && action.taskId) {
      const before = state.tasks.length + state.done.length;
      state.tasks = state.tasks.filter(t => t.id !== action.taskId);
      state.done = state.done.filter(t => t.id !== action.taskId);
      if (state.tasks.length + state.done.length < before) applied++;
      continue;
    }
    const t = findTask(action.taskId);
    if (!t) continue;
    switch (action.op) {
      case 'reschedule':
      case 'updateDate':
        if (typeof action.newDate === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(action.newDate)) {
          t.date = action.newDate;
          t.rollover = false;
          t.rolloverCount = 0;
          applied++;
        }
        break;
      case 'updateDur':
        if (typeof action.dur === 'number' && action.dur >= 5) {
          t.durPlan = action.dur;
          applied++;
        }
        break;
      case 'updateCat':
        if (typeof action.cat === 'string' && /^[SRGC]$/.test(action.cat)) {
          t.cat = action.cat;
          applied++;
        }
        break;
      case 'updatePriority':
        if (typeof action.priority === 'string' && /^(urgent-important|urgent-unimportant|important|normal)$/.test(action.priority)) {
          t.priority = action.priority;
          t.priorityManualOverride = true;
          applied++;
        }
        break;
      case 'updateStartTime':
        if (typeof action.startTime === 'string' && /^\d{2}:\d{2}$/.test(action.startTime)) {
          t.startTime = action.startTime;
          applied++;
        }
        break;
    }
  }

  if (applied > 0) {
    lastOperation = { snapshot, summary, ts: Date.now() };
    // 12 秒后自动隐藏撤销条（不真正销毁数据）
    setTimeout(() => {
      if (lastOperation && Date.now() - lastOperation.ts >= 11000) {
        lastOperation = null;
        if (currentTab === 'plans' || currentTab === 'today') render();
      }
    }, 12000);
  }
  saveState();
  render();
  return applied;
}

function undoLastOperation() {
  if (!lastOperation) return;
  state.tasks = lastOperation.snapshot.tasks;
  state.done = lastOperation.snapshot.done;
  state.recurTemplates = lastOperation.snapshot.recurTemplates;
  state.favorites = lastOperation.snapshot.favorites;
  lastOperation = null;
  saveState();

  toast('已撤销');
}

}

/* ===================== 推迟功能：单个推迟 / 批量推迟 / 承认现实 ===================== */

/* 任务是否可推迟（用于决定是否包裹 swipe-wrap 与批量推迟） */
function isDeferEligible(t) {
  if (!t) return false;
  if (t.isRecur) return false;
  if (t.timerState === 'done') return false;
  if (t.date !== todayStr()) return false;
  return true;
}

/* 计算下周一日期（如果今天就是周一，则跳到下一个周一） */
function nextMondayDate() {
  const today = todayStr();
  const wd = new Date(today).getDay(); // 0=Sun..6=Sat
  let days = (1 - wd + 7) % 7;
  if (days === 0) days = 7;
  return dateAdd(today, days);
}

/* 把目标 key 转成日期串 */
function deferTargetToDate(target) {
  const today = todayStr();
  if (target === 'tomorrow') return dateAdd(today, 1);
  if (target === 'dayAfter') return dateAdd(today, 2);
  if (target === 'nextMonday') return nextMondayDate();
  return null;
}

/* ===== 左滑手势：文档级事件委托，touch + mouse 都走同一套状态机 =====
 * 关键设计：
 *  1) 委托在 document 上 → 今日页 / 计划页 / 专注块的卡片统一生效
 *  2) 阈值 10px：水平位移超 10px 才锁定为"滑动"，避免轻微移动吞掉点击
 *  3) touchmove 在锁定为水平后 preventDefault → 阻止页面滚动
 *  4) 鼠标真实拖动后吞掉紧跟着的 click → 防止误触发卡片详情/按钮
 */
const SWIPE_THRESHOLD = 10;
let _swipe = null;          // { wrap, card, actions, startX, startY, dx, dy, lockedAxis, actionsWidth, cardWidth, baseTx }
let _swallowNextClick = false;

function _findSwipeWrap(target) {
  if (!target || !target.closest) return null;
  // 不接管点在 swipe-actions 按钮上的事件（让按钮自己处理 onclick）
  if (target.closest('.swipe-actions')) return null;
  return target.closest('.swipe-wrap');
}

function _swipeStart(clientX, clientY, wrap) {
  const card = wrap.querySelector('.task-card');
  const actions = wrap.querySelector('.swipe-actions');
  if (!card || !actions) return null;
  if (_activeSwipeWrap && _activeSwipeWrap !== wrap) closeActiveSwipe();
  const actionsWidth = actions.getBoundingClientRect().width || 200;
  const wasOpen = wrap.classList.contains('swipe-open');
  return {
    wrap, card, actions,
    startX: clientX, startY: clientY,
    dx: 0, dy: 0,
    lockedAxis: null,
    actionsWidth,
    cardWidth: card.getBoundingClientRect().width || 300,
    baseTx: wasOpen ? -actionsWidth : 0,
    wasOpen,
  };
}

function _swipeMove(clientX, clientY, e) {
  if (!_swipe) return;
  _swipe.dx = clientX - _swipe.startX;
  _swipe.dy = clientY - _swipe.startY;
  if (_swipe.lockedAxis == null) {
    if (Math.abs(_swipe.dx) > SWIPE_THRESHOLD || Math.abs(_swipe.dy) > SWIPE_THRESHOLD) {
      _swipe.lockedAxis = Math.abs(_swipe.dx) > Math.abs(_swipe.dy) ? 'x' : 'y';
      if (_swipe.lockedAxis === 'x') _swipe.wrap.classList.add('swiping');
    }
  }
  if (_swipe.lockedAxis === 'x') {
    if (e && e.cancelable) e.preventDefault();
    let tx = _swipe.baseTx + _swipe.dx;
    tx = Math.min(0, Math.max(tx, -_swipe.actionsWidth - 20));
    _swipe.card.style.transform = `translateX(${tx}px)`;
  }
}

function _swipeEnd() {
  if (!_swipe) return;
  const s = _swipe;
  s.wrap.classList.remove('swiping');
  if (s.lockedAxis === 'x') {
    const finalTx = s.baseTx + s.dx;
    const openThreshold = s.cardWidth / 3;
    if (-finalTx > openThreshold) {
      s.card.style.transform = `translateX(${-s.actionsWidth}px)`;
      s.wrap.classList.add('swipe-open');
      _activeSwipeWrap = s.wrap;
    } else {
      s.card.style.transform = '';
      s.wrap.classList.remove('swipe-open');
      if (_activeSwipeWrap === s.wrap) _activeSwipeWrap = null;
    }
    // 锁定过水平 → 真实滑动，吞掉紧随其后的 click（鼠标用得着；触屏 preventDefault 已抑制）
    _swallowNextClick = true;
  } else if (s.wasOpen && Math.abs(s.dx) <= SWIPE_THRESHOLD && Math.abs(s.dy) <= SWIPE_THRESHOLD) {
    // 在已展开的卡片可见区域上轻点 → 收起，吞掉这次 click（避免误开详情）
    s.card.style.transform = '';
    s.wrap.classList.remove('swipe-open');
    if (_activeSwipeWrap === s.wrap) _activeSwipeWrap = null;
    _swallowNextClick = true;
  }
  _swipe = null;
}

/* Touch */
document.addEventListener('touchstart', e => {
  const wrap = _findSwipeWrap(e.target);
  if (!wrap) return;
  const t = e.touches[0];
  _swipe = _swipeStart(t.clientX, t.clientY, wrap);
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!_swipe) return;
  const t = e.touches[0];
  _swipeMove(t.clientX, t.clientY, e);
}, { passive: false });

document.addEventListener('touchend', () => { _swipeEnd(); });
document.addEventListener('touchcancel', () => { _swipeEnd(); });

/* Mouse（桌面） */
document.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const wrap = _findSwipeWrap(e.target);
  if (!wrap) return;
  _swipe = _swipeStart(e.clientX, e.clientY, wrap);
});

document.addEventListener('mousemove', e => {
  if (!_swipe) return;
  _swipeMove(e.clientX, e.clientY, e);
});

document.addEventListener('mouseup', () => {
  _swipeEnd();
});

/* 点击：捕获阶段优先 — 如果刚发生过真实滑动则吞掉，否则放行；同时关闭已展开的其他卡片 */
document.addEventListener('click', e => {
  if (_swallowNextClick) {
    _swallowNextClick = false;
    e.stopPropagation();
    e.preventDefault();
    return;
  }
  if (_activeSwipeWrap && !_activeSwipeWrap.contains(e.target)) {
    closeActiveSwipe();
  }
}, true);

/* 点击滑出按钮 */
function onSwipeActionClick(e, taskId, target) {

  closeActiveSwipe();
  deferSingleTask(taskId, target);
}

/* 单个推迟：处理规则 + 紧急确认 + DDL 守门 */
function deferSingleTask(taskId, target) {
  const t = state.tasks.find(x => x.id === taskId);
  if (!t) return;
  if (t.isRecur) { toast('循环任务不可推迟'); return; }

  const today = todayStr();
  if (t.deadline) {
    const dd = diffDays(today, t.deadline);
    if (dd <= 1) {
      if (navigator.vibrate) try { navigator.vibrate(30); } catch(_) {}
      toast('明天就截止了，来不及了 🐌');
      return;
    }
  }

  if (t.priority === 'urgent-important') {
    showDeferUrgentConfirm(t, target);
    return;
  }

  performDefer(t, target);
}

/* 紧急+重要任务推迟前的确认 */

/* 真正执行推迟：修改日期 + rolloverCount +1 + 触发承认现实弹窗（如适用） */
function performDefer(t, target) {
  const newDate = deferTargetToDate(target);
  if (!newDate) return;
  if (!t.originalDate) t.originalDate = t.date;
  t.date = newDate;

  t.rollover = true;

    saveState();
    render();
    showRealityCheck(t.id);
    return;
  }

  render();

}

function performBatchDefer(moveList) {
  const tomorrow = dateAdd(todayStr(), 1);
  const realityTriggers = [];
  moveList.forEach(t => {
    if (!t.originalDate) t.originalDate = t.date;
    t.date = tomorrow;
    t.rolloverCount = (t.rolloverCount || 0) + 1;
    t.rollover = true;
    if (t.rolloverCount === 3 && !t.realityCheckShown) {
      t.realityCheckShown = true;
      realityTriggers.push(t);
    }
  });
  saveState();
  render();
  toast(`已推迟 ${moveList.length} 件任务`);
  // 多个任务命中第三次推迟，依次弹出（队列化）
  if (realityTriggers.length > 0) {
    chainRealityChecks(realityTriggers.map(t => t.id));
  }
}

function chainRealityChecks(ids) {
  if (ids.length === 0) return;
  const next = ids.shift();
  showRealityCheck(next, () => chainRealityChecks(ids));
}

/* 调用千问 API 获取一句话 */
async function fetchBatchDeferAILine() {
  const today = todayStr();
  const doneToday = state.done.filter(t => t.date === today);
  const n = doneToday.length;
  const s = doneToday.filter(t => t.cat === 'S').length;
  const r = doneToday.filter(t => t.cat === 'R').length;
  const g = doneToday.filter(t => t.cat === 'G').length;
  const c = doneToday.filter(t => t.cat === 'C').length;
  const km = Math.round((snailMileage && snailMileage.total) || 0);

  const apiKey = getApiKey();
  if (!apiKey) {
    return `今天完成了 ${n} 件任务，蜗牛爬了 ${km} km。`;
  }

  const prompt = `今天用户完成了${n}件任务，
分类：S${s}件 R${r}件 G${g}件 C${c}件，
蜗牛爬了${km}km。
用一句话陈述今天的情况，15字以内，
不要评判好坏，不要说加油，语气平静自然，
可以带一点点蜗牛的意象。`;

  const resp = await fetch(QWEN_URL, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: QWEN_MODEL_TEXT,
      max_tokens: 80,
      messages: [
        { role: 'system', content: '你是一个语气平静自然的写作助手，只输出一句话，不要引号，不要解释。' },
        { role: 'user', content: prompt }
      ]
    })
  });
  if (!resp.ok) throw new Error('API ' + resp.status);
  const data = await resp.json();
  let txt = (data.choices?.[0]?.message?.content || '').trim();
  txt = txt.replace(/^["“『「]+|["”』」]+$/g, '').split('\n')[0].trim();
  if (!txt) txt = `今天完成了 ${n} 件任务，蜗牛爬了 ${km} km。`;
  return txt;
}

function handleSchedule(text) {
  let m = text.match(/(\d{2}):?(\d{2})\s*-\s*(\d{2}):?(\d{2})/);
  let startH, startM, endH, endM;
  if (m) {
    startH = parseInt(m[1]); startM = parseInt(m[2]);
    endH = parseInt(m[3]); endM = parseInt(m[4]);
  } else {
    m = text.match(/排.*?到\s*(\d+)\s*点/);
    if (m) {
      const now = new Date();
      startH = now.getHours(); startM = now.getMinutes();
      endH = parseInt(m[1]); endM = 0;
    } else {
      toast('未识别。例：schedule 1800-2300');
      return;
    }
  }
  const today = todayStr();
  const tasks = state.tasks.filter(t => t.date === today);
  if (tasks.length === 0) { toast('今天没有任务'); return; }

  // 精力模型排序：R > S/G > C，再按优先级
  const energy = { R: 0, S: 1, G: 1, C: 2 };
  const sorted = tasks.slice().sort((a, b) => {
    const ea = energy[a.cat] ?? 3, eb = energy[b.cat] ?? 3;
    if (ea !== eb) return ea - eb;
    return (PRI_ORDER[a.priority] ?? 9) - (PRI_ORDER[b.priority] ?? 9);
  });

  const totalMin = (endH * 60 + endM) - (startH * 60 + startM);
  if (totalMin <= 0) { toast('时间区间无效'); return; }

  // 分配时间，每 90 分钟插入 10 分钟休息
  const result = [];
  let cur = startH * 60 + startM;
  let elapsed = 0;
  for (const t of sorted) {
    if (cur + t.durPlan > endH * 60 + endM) break;
    result.push({ type: 'task', task: t, start: cur, end: cur + t.durPlan });
    cur += t.durPlan;
    elapsed += t.durPlan;
    if (elapsed >= 90 && cur + 10 <= endH * 60 + endM) {
      result.push({ type: 'break', start: cur, end: cur + 10 });
      cur += 10;
      elapsed = 0;
    }
  }
  window._scheduleResult = result;
  render();
  toast(`已排 ${result.filter(r => r.type === 'task').length} 个任务`);
}

function fmtMin(min) {

function getRangeTasks(view) {
  const today = todayStr();
  const all = [...state.tasks, ...state.done];
  if (view === 'day') {
    return all.filter(t => t.date === today);
  }
  if (view === 'week') {
    // 本周从周一到今天
    const wd = weekday(today);
    const monday = dateAdd(today, -((wd + 6) % 7));
    return all.filter(t => t.date >= monday && t.date <= today);
  }
  if (view === 'month') {
    const d = new Date();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const prefix = `${d.getFullYear()}-${m}`;
    return all.filter(t => t.date.startsWith(prefix));
  }
  return [];
}

function destroyAllCharts() {
  Object.keys(chartInstances).forEach(k => {
    try { chartInstances[k].destroy(); } catch(_) {}
    delete chartInstances[k];
  });

function computeCatTotals(tasks) {
  const totals = { S: 0, R: 0, G: 0, C: 0 };
  tasks.forEach(t => {
    const isDone = state.done.some(d => d.id === t.id);
    const v = isDone ? (t.durActual ?? t.durPlan) : t.durPlan;
    if (totals[t.cat] !== undefined) totals[t.cat] += (v || 0);
  });
  return totals;
}

function buildMonthSeries() {
  const d = new Date();
  const daysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  const labels = [];
  const series = { S: [], R: [], G: [], C: [] };
  let total = 0;
  for (let i = 1; i <= daysInMonth; i++) {
    labels.push(i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const dayTasks = [...state.tasks, ...state.done].filter(t => t.date === ds);
    ['S','R','G','C'].forEach(c => {
      const sum = dayTasks
        .filter(t => t.cat === c)
        .reduce((s,t) => {
          const isDone = state.done.some(dd => dd.id === t.id);
          return s + ((isDone ? (t.durActual ?? t.durPlan) : t.durPlan) || 0);
        }, 0);
      series[c].push(sum);
      total += sum;
    });
  }
  return { labels, series, total };
}

function buildAssistantContext() {
  const trim = t => ({
    desc: t.desc,
    cat: t.cat,
    priority: t.priority,
    date: t.date,
    startTime: t.startTime,
    deadline: t.deadline,
    durPlan: t.durPlan,
    durActual: t.durActual,
    notes: t.notes,
    isRecur: t.isRecur,
    rollover: t.rollover
  });
  return {
    today: todayStr(),
    pending: state.tasks.map(trim),
    done_today: state.done.map(trim),
    recurTemplates: state.recurTemplates.map(tpl => ({
      desc: tpl.desc, cat: tpl.cat, days: tpl.days, durPlan: tpl.durPlan, startTime: tpl.startTime
    })),
    recurDoneLog: state.recurDoneLog
  };
}

function buildCheckInSystemPrompt() {
  const today = todayStr();
  const todayUnfinished = state.tasks.filter(t => t.date === today);
  const todayDone = state.done.filter(t => t.date === today);
  const totalTasks = todayUnfinished.length + todayDone.length;
  const doneTasks = todayDone.length;
  const rate = totalTasks > 0 ? Math.round(doneTasks / totalTasks * 100) : 0;

  const sumMin = (arr, c) => arr.filter(x => x.cat === c).reduce((s, x) => {
    const isDone = state.done.some(d => d.id === x.id);
    return s + ((isDone ? (x.durActual ?? x.durPlan) : x.durPlan) || 0);
  }, 0);
  const all = [...todayUnfinished, ...todayDone];
  const h = c => (sumMin(all, c) / 60).toFixed(1);

  return `你是用户的私人时间管家，名字叫 Chronos。
今天是 ${today}。

用户今日数据：
- 计划任务：${totalTasks} 个
- 已完成：${doneTasks} 个
- 完成率：${rate}%
- 已完成任务：${todayDone.map(t => t.desc).join('、') || '（无）'}
- 未完成任务：${todayUnfinished.map(t => t.desc).join('、') || '（无）'}
- 各分类时长：S:${h('S')}h R:${h('R')}h G:${h('G')}h C:${h('C')}h

请用温暖、不评判的语气和用户对话。
不要说教，不要催促，像一个理解你的朋友。
- 第一句简短问候，提到完成数，问"今天感觉怎么样？"
- 用户回应后：一句肯定（不管完成多少都要找到值得肯定的）+ 一个具体的明日建议；如果有未完成任务，温和地问是否要调整
- 控制每条回复在 100 字以内`;
}

function buildAssistantSystemPrompt() {
  if (checkInMode) return buildCheckInSystemPrompt();
  const ctx = buildAssistantContext();
  const wd = '日一二三四五六'[new Date().getDay()];
  return `你是用户的私人日程助手。以下是用户当前所有任务数据（JSON）：

${JSON.stringify(ctx, null, 2)}

今天是 ${ctx.today}（周${wd}）。

字段含义：
- pending：未完成任务列表
- done_today：今日已完成（每天 0 点会重置）
- recurTemplates：循环任务模板（days 是 0=周日 ... 6=周六）
- recurDoneLog：循环任务完成记录，key 形如 "templateId_YYYY-MM-DD"
- cat：S=学习 / R=研究 / G=成长（健身阅读等） / C=杂事
- priority：urgent-important(红) / urgent-unimportant(橙) / important(蓝) / normal(绿)
- durPlan 计划分钟数，durActual 实际分钟数

优先级判定规则（如果用户问"帮我看优先级"或"调整优先级"，按此规则给建议）：
1) 重要：desc 含 论文/作业/报告/考试/答辩/项目/实验/文献/提交/交/due/deadline/ddl
2) 紧急：date 是今天或明天，或 deadline ≤ 3 天，或 desc 含 今天/明天/马上/立刻/紧急/尽快/截止
3) 组合：重要+紧急→红 / 重要→蓝 / 紧急→橙 / 都不→默认蓝（宁可高估）

回答要求：
- 语气像了解用户的朋友，简洁直接，不说教不重复问题
- 用中文回答
- 涉及具体任务时直接引用任务描述
- 给出可执行的建议，不要泛泛而谈
- 控制在 200 字以内，长答案用列表

【添加任务能力 — 重要】
如果用户的意图是"加任务/记下来/帮我加一个/提醒我..."等创建任务的请求：
1) 先在回复正文里用一句话确认你帮他加了什么（例如"好，已加上明天下午的跑步"）
2) 在回复的最后追加一行特殊标签，前端会解析这行并真正写入任务列表：
   <ADD_TASK>{"desc":"跑步","date":"YYYY-MM-DD","startTime":"HH:MM 或 null","durPlan":分钟数,"cat":"S/R/G/C","priority":"urgent-important/urgent-unimportant/important/normal"}</ADD_TASK>
3) 规则：
   - 一次只能加一个任务，desc 简短（30 字内）
   - date 用绝对日期（YYYY-MM-DD），今天就是 ${ctx.today}
   - 不知道的字段：startTime 用 null，durPlan 用 60，cat 用 C，priority 用 normal
   - 整个 <ADD_TASK>…</ADD_TASK> 必须是合法 JSON，前端会原样解析
   - 只有在用户明确要"加任务/记下来"时才输出这个标签，单纯聊天/查询不要输出`;
}

async function startCheckIn() {
  const apiKey = getApiKey();
  if (!apiKey) { toast('请先在设置中填入 API Key'); return; }
  // 切换到复盘模式，重置历史
  checkInMode = true;
  chatHistory = [];
  chatLoading = true;
  currentTab = 'assistant';
  document.querySelectorAll('.tabbar .tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === 'assistant');
  });
  render();

  try {
    const resp = await fetch(QWEN_URL, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: QWEN_MODEL_TEXT,
        max_tokens: 256,
        messages: [
          { role: 'system', content: buildCheckInSystemPrompt() },
          { role: 'user', content: '开始今日复盘，简短问候我并问我今天感觉怎么样' }
        ]
      })
    });
    if (!resp.ok) throw new Error('API ' + resp.status);
    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content || '今天感觉怎么样？';
    chatHistory.push({ role: 'assistant', content: reply });
  } catch(e) {

  }
}

// 从助手回复里抽取 <ADD_TASK>{...}</ADD_TASK> 标签，真正创建任务，并返回去掉标签后的文本
function handleAssistantAddTaskTags(reply) {
  const re = /<ADD_TASK>([\s\S]*?)<\/ADD_TASK>/g;
  let addedCount = 0;
  let m;
  while ((m = re.exec(reply)) !== null) {
    const jsonStr = m[1].trim();
    try {
      const obj = JSON.parse(jsonStr);
      if (!obj || typeof obj.desc !== 'string' || !obj.desc.trim()) continue;
      const t = makeTask({
        desc: obj.desc.trim(),
        date: (typeof obj.date === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(obj.date)) ? obj.date : todayStr(),
        startTime: (typeof obj.startTime === 'string' && /^\d{2}:\d{2}$/.test(obj.startTime)) ? obj.startTime : null,
        durPlan: (typeof obj.durPlan === 'number' && obj.durPlan >= 5) ? obj.durPlan : 60,
        cat: (typeof obj.cat === 'string' && /^[SRGC]$/.test(obj.cat)) ? obj.cat : 'C',
        priority: (typeof obj.priority === 'string' && /^(urgent-important|urgent-unimportant|important|normal)$/.test(obj.priority)) ? obj.priority : 'normal'
      });
      state.tasks.push(t);
      addedCount++;
    } catch(e) {
      // 单条解析失败不影响其它
    }
  }
  const cleanText = reply.replace(re, '').replace(/\n{3,}/g, '\n\n').trim() || '已加好。';
  return { cleanText, addedCount };
}

async function sendChatMessage(text) {
  const apiKey = getApiKey();
  if (!apiKey) {
    chatHistory.push({ role: 'user', content: text });
    chatHistory.push({ role: 'assistant', content: '请先在设置中填入 API Key。' });
    renderChatMessages();
    return;
  }
  if (chatLoading) return;

  chatHistory.push({ role: 'user', content: text });
  chatLoading = true;
  renderChatMessages();

  try {
    const messages = [
      { role: 'system', content: buildAssistantSystemPrompt() },
      ...chatHistory
    ];
    const resp = await fetch(QWEN_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${apiKey}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: QWEN_MODEL_TEXT,
        max_tokens: 1024,
        messages
      })
    });

    if (!resp.ok) {
      const errTxt = await resp.text().catch(() => '');
      chatHistory.push({ role: 'assistant', content: `API 调用失败（${resp.status}）。${errTxt ? errTxt.slice(0,200) : ''}` });
    } else {
      const data = await resp.json();
      const rawReply = data.choices?.[0]?.message?.content || '（没收到内容）';
      // 解析 <ADD_TASK>{...}</ADD_TASK> 动作标签，真正创建任务
      const { cleanText, addedCount } = handleAssistantAddTaskTags(rawReply);
      chatHistory.push({ role: 'assistant', content: cleanText });
      if (addedCount > 0) {
        saveState();
        render();
        toast(`已加入 ${addedCount} 个任务到计划`);
      }
    }
  } catch(e) {
    chatHistory.push({ role: 'assistant', content: `出错了：${e.message}` });
  } finally {
    chatLoading = false;
    renderChatMessages();
    // 刷新工具栏的消息计数
    const tb = document.querySelector('.chat-toolbar .meta');
    if (tb) tb.textContent = `已加载 ${state.tasks.length} 个待办 · ${state.done.length} 已完成 · ${chatHistory.length} 条对话`;
  }
}

function deleteFav(id) {
  state.favorites = state.favorites.filter(f => f.id !== id);

  state.done.forEach(t => { if (t.favoriteId === id) t.favoriteId = null; });
  saveState();
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `chronos-backup-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file) {
  const r = new FileReader();
  r.onload = () => {
    try {
      const data = JSON.parse(r.result);
      if (!data || typeof data !== 'object' || !Array.isArray(data.tasks)) {
        throw new Error('文件不符合 Chronos 备份格式');
      }
      // 导入前自动把当前数据备份到独立 key，避免误导入导致丢数据
      try {
        const cur = localStorage.getItem('chronos_state');
        if (cur) {
          const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
          localStorage.setItem('chronos_state_backup_' + ts, cur);
        }
      } catch(_) {}
      state = { ...JSON.parse(JSON.stringify(DEFAULT_STATE)), ...data };
      saveState();
      render();
      toast('导入成功，旧数据已备份');
    } catch(e) {
      toast('导入失败：' + e.message);
    }
  };
  r.readAsText(file);
}

/* ---------------- 日历导出 ICS ---------------- */
function icsDate(dateStr, hour, min) {
  const d = new Date(dateStr);
  d.setHours(hour, min, 0, 0);
  return d.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
}
function icsDateUTC(date) {
  return date.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
}

function buildICS(events) {
  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Chronos Butler//ZH//',
    'CALSCALE:GREGORIAN'
  ];
  events.forEach(e => {
    lines.push('BEGIN:VEVENT');
    lines.push(`UID:${e.uid}`);
    lines.push(`DTSTAMP:${icsDateUTC(new Date())}`);
    lines.push(`DTSTART:${e.start}`);
    lines.push(`DTEND:${e.end}`);
    lines.push(`SUMMARY:${e.summary.replace(/[,;\\]/g, '\\$&')}`);
    if (e.desc) lines.push(`DESCRIPTION:${e.desc.replace(/[,;\\]/g, '\\$&').replace(/\n/g, '\\n')}`);
    if (e.alarms) e.alarms.forEach(a => {
      lines.push('BEGIN:VALARM');
      lines.push(`TRIGGER:-PT${a}M`);
      lines.push('ACTION:DISPLAY');
      lines.push(`DESCRIPTION:${e.summary}`);
      lines.push('END:VALARM');
    });
    // deadline 特殊提醒（前一天 20:00 / 当天 09:00）
    if (e.deadlineAlarms) {
      e.deadlineAlarms.forEach(t => {
        lines.push('BEGIN:VALARM');
        lines.push(`TRIGGER;VALUE=DATE-TIME:${t}`);
        lines.push('ACTION:DISPLAY');
        lines.push(`DESCRIPTION:${e.summary}`);
        lines.push('END:VALARM');
      });
    }
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

function taskToICSEvent(t) {
  // 有 startTime 用真实时间；否则默认 09:00
  let startHour = 9, startMin = 0;
  if (t.startTime && /^\d{1,2}:\d{2}$/.test(t.startTime)) {
    const [h, m] = t.startTime.split(':').map(Number);
    startHour = h; startMin = m;
  }
  const start = icsDate(t.date, startHour, startMin);
  const endD = new Date(t.date);
  endD.setHours(startHour, startMin + t.durPlan, 0, 0);
  const end = icsDateUTC(endD);

  let alarms;
  let deadlineAlarms;
  if (t.isRecur) alarms = [10];
  else if (t.deadline) {
    alarms = [];
    // 前一天 20:00 和 当天 09:00
    const ddl = t.deadline;
    deadlineAlarms = [icsDate(dateAdd(ddl, -1), 20, 0), icsDate(ddl, 9, 0)];
  } else {
    alarms = [15]; // 普通任务提前15
  }

  return {
    uid: `${t.id}@chronos`,
    start, end,
    summary: t.desc,
    desc: [
      `分类: ${t.cat}`,
      `优先级: ${t.priority}`,
      t.deadline ? `截止: ${t.deadline}` : '',
      t.notes || ''
    ].filter(Boolean).join('\n'),
    alarms,
    deadlineAlarms
  };
}

function exportTaskICS(taskId) {
  const t = findTask(taskId);
  if (!t) return;
  const ics = buildICS([taskToICSEvent(t)]);
  downloadICS(ics, `${t.desc.slice(0,20)}.ics`);
}

function exportTodayICS() {
  const today = todayStr();
  const tasks = [...state.tasks, ...state.done].filter(t => t.date === today);
  if (tasks.length === 0) { toast('今天没任务'); return; }
  const ics = buildICS(tasks.map(taskToICSEvent));
  downloadICS(ics, `今日-${today}.ics`);
}

function downloadICS(content, filename) {
  const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast('已导出');
}

/* ---------------- 拖拽 / 粘贴 上传截图 ---------------- */
(function setupDragPasteUpload() {
  let dragCounter = 0;

  function hasFiles(e) {
    return e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files');
  }
  function getUploadBar() {
    const bar = document.querySelector('.input-bar');
    if (!bar || !bar.querySelector('#img-btn')) return null;
    return bar;
  }
  function showHighlight() {
    const bar = getUploadBar();
    if (!bar) return;
    bar.classList.add('drag-over');
    if (!bar.querySelector('.drag-overlay')) {
      const overlay = document.createElement('div');
      overlay.className = 'drag-overlay';
      overlay.textContent = '松开即上传';
      bar.appendChild(overlay);
    }
  }
  function clearHighlight() {
    document.querySelectorAll('.input-bar.drag-over').forEach(bar => {
      bar.classList.remove('drag-over');
      const overlay = bar.querySelector('.drag-overlay');
      if (overlay) overlay.remove();
    });
  }
  function processFile(file) {
    if (!file) return;
    if (!file.type || !file.type.startsWith('image/')) {
      toast('请上传图片文件');
      return;
    }
    handleImageUpload(file);
  }

  window.addEventListener('dragenter', e => {
    if (!hasFiles(e)) return;
    e.preventDefault();
    dragCounter++;
    showHighlight();
  });
  window.addEventListener('dragover', e => {
    if (!hasFiles(e)) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  });
  window.addEventListener('dragleave', e => {
    if (!hasFiles(e)) return;
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) {
      dragCounter = 0;
      clearHighlight();
    }
  });
  window.addEventListener('drop', e => {
    if (!hasFiles(e)) return;
    e.preventDefault();
    dragCounter = 0;
    clearHighlight();
    if (!getUploadBar()) return; // 当前视图不支持上传截图
    processFile(e.dataTransfer.files[0]);
  });

  window.addEventListener('paste', e => {
    if (!getUploadBar()) return;
    const cd = e.clipboardData;
    if (!cd) return;
    let imgFile = null;
    const items = cd.items || [];
    for (const item of items) {
      if (item.kind === 'file' && item.type && item.type.startsWith('image/')) {
        imgFile = item.getAsFile();
        break;
      }
    }
    if (!imgFile && cd.files) {
      for (const f of cd.files) {
        if (f.type && f.type.startsWith('image/')) { imgFile = f; break; }
      }
    }
    if (imgFile) {
      e.preventDefault();
      processFile(imgFile);
    }
  });
})();

/* ============== 开屏动画 ============== */
function makeSpiralPath(cx, cy, startR, endR, turns, steps) {
  // 阿基米德螺旋：r 随 t 线性收缩，theta 顺时针累加（负方向）
  const totalAngle = turns * 2 * Math.PI;
  let d = '';
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const angle = -totalAngle * t;             // 顺时针向内
    const r = startR + (endR - startR) * t;    // 半径线性收缩
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    d += (i === 0 ? 'M ' : 'L ') + x.toFixed(2) + ' ' + y.toFixed(2) + ' ';
  }
  return d.trim();
}

/* ===================== Service Worker 注册 + 强制更新检测 =====================
 * 每次 push 后用户下次打开 app：
 *   1. register('sw.js') → 浏览器拉最新 sw.js
 *   2. reg.update() 立即检查更新
 *   3. 字节不同 → install (skipWaiting) → activated → controllerchange
 *   4. 自动 reload → 用户看到最新版本，localStorage 完整保留
 * 用 refreshing 旗子防止 statechange 和 controllerchange 双重 reload
 * 用 hadController 判断首次安装 vs 更新场景，首次安装不刷新（页面已是最新）
 * ============================================================================ */
// 强化守卫：iOS 私密浏览 / 某些 PWA 上下文里 'serviceWorker' in navigator 为真但 navigator.serviceWorker === undefined
try {
  if ('serviceWorker' in navigator && navigator.serviceWorker) {
    var refreshing = false;
    var hadController = false;
    try { hadController = !!navigator.serviceWorker.controller; } catch(_) {}
  const doReload = () => {
    if (refreshing) return;
    refreshing = true;
    console.log('[App] 新版本已激活，自动刷新');
    window.location.reload();
  };

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => {
        // 立即检查是否有新版本
        reg.update().catch(() => {});
        // 监听新 SW 出现并激活
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            // activated 状态触发刷新；仅在更新场景（已有 controller）才刷
            if (nw.state === 'activated' && hadController) {
              doReload();
            }
          });
        });
      })
      .catch(err => console.warn('SW register failed:', err));
  });

  // controllerchange：新 SW 接管页面时也触发；同样仅更新场景才刷
  // refreshing 旗子和 doReload 函数共享，避免和 statechange 冲突
  if (hadController) {
    navigator.serviceWorker.addEventListener('controllerchange', doReload);
  }

  // 用户从后台切回 app 时主动检查更新
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      navigator.serviceWorker.getRegistration().then(reg => {
        if (reg) reg.update().catch(() => {});
      });
    }
  });
  }
