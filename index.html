<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<!-- 禁止浏览器/中间代理缓存 index.html，确保 PWA 部署后用户拿到最新版本 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<!-- 衬线字体：用于页面大标题，营造手账/出版物质感；系统中文衬线字体先 fallback -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<title>每日计划</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- 开屏动画（DOM 解析完成立即开始，3 阶段共 ~3.2s 后自动移除） -->
<div id="splash" class="splash-screen">
  <div class="splash-content">
    <div class="splash-snail-path">
      <div class="splash-snail-bob">
        <svg class="splash-snail-svg" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
          <!-- 身体：左侧括号形曲线（路径由 head 顶左侧弧下到底部，再延伸到 shell 下方）-->
          <path d="M 32 32 Q 8 32 8 55 Q 8 75 28 75 L 72 75"
                fill="none" stroke="#6B4C2A" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round"/>
          <!-- 螺旋壳（阿基米德螺旋，路径由 JS 在 setupSplash() 注入）-->
          <path id="splash-spiral" d=""
                fill="none" stroke="#6B4C2A" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round"/>
          <!-- 两个触角（实心小圆点）-->
          <circle cx="14" cy="22" r="2" fill="#6B4C2A"/>
          <circle cx="25" cy="19" r="2" fill="#6B4C2A"/>
        </svg>
      </div>
    </div>
    <div class="splash-brand">Snail</div>
    <div class="splash-sub">Slow down &amp; Get things done.</div>
  </div>
  <div class="splash-credit">made by Melam</div>
</div>

<!-- 登录覆盖层（未登录时显示，登录或选择本地模式后隐藏） -->
<div id="auth-overlay" class="auth-overlay hidden">
  <div class="auth-card">
    <h1 class="auth-title">每日计划</h1>
    <p class="auth-sub">登录后可在多设备间同步任务</p>

    <!-- 登录表单 -->
    <div id="auth-login-form">
      <input type="email" id="auth-email" placeholder="邮箱" autocomplete="email">
      <input type="password" id="auth-password" placeholder="密码（≥ 6 位）" autocomplete="current-password">
      <div id="auth-error" class="auth-error"></div>
      <div class="auth-actions">
        <button class="btn-primary" id="btn-login">登录</button>
        <button class="btn-secondary" id="btn-register">注册</button>
      </div>
    </div>

    <!-- 注册表单（验证码两步流程） -->
    <div id="auth-register-form" class="hidden">
      <input type="email" id="reg-email" placeholder="邮箱" autocomplete="email">
      <div class="auth-code-row">
        <input type="text" id="reg-code" placeholder="6位验证码" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
        <button id="btn-send-code" class="btn-send-code">发送验证码</button>
      </div>
      <input type="password" id="reg-password" placeholder="密码（≥ 6 位）" autocomplete="new-password">
      <div id="reg-error" class="auth-error"></div>
      <div class="auth-actions">
        <button class="btn-secondary" id="btn-back-login">返回登录</button>
        <button class="btn-primary" id="btn-do-register">注册</button>
      </div>
    </div>

    <button class="auth-guest-btn" id="btn-guest">暂不登录，本地使用</button>
  </div>
</div>

<div class="app" style="display:none">

  <!-- Header -->
  <div class="header">
    <div class="header-title-row">
      <div class="snail-status-group">
        <div id="snail-status" class="snail-status" aria-label="今日蜗牛状态"></div>
        <span id="snail-state-text" class="snail-state-text"></span>
      </div>
      <div>
        <h1 id="page-title">全部计划</h1>
        <div class="date" id="header-date"></div>
      </div>
    </div>
    <div id="header-extra"></div>
  </div>

  <!-- Tab 内容容器 -->
  <main id="main"></main>

</div>

<!-- 底部 Tab（lucide outline 图标 stroke-width 1.5） -->
<nav class="tabbar" style="display:none">
  <button class="tab active" data-tab="plans" aria-label="全部计划">
    <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span><span>计划</span>
  </button>
  <button class="tab" data-tab="today" aria-label="今日">
    <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg></span><span>今日</span>
  </button>
  <button class="tab" data-tab="recur" aria-label="循环任务">
    <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 4 21 10 15 10"/><polyline points="3 20 3 14 9 14"/><path d="M3.51 9a9 9 0 0 1 14.13-3.36L21 9M21 14l-3.36 3.36A9 9 0 0 1 3.51 15"/></svg></span><span>循环</span>
  </button>
  <button class="tab" data-tab="stats" aria-label="统计">
    <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="6"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span><span>统计</span>
  </button>
  <button class="tab" data-tab="assistant" aria-label="助手">
    <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 L13.5 9 L19.5 10.5 L13.5 12 L12 18 L10.5 12 L4.5 10.5 L10.5 9 Z"/><path d="M18 4 L18.5 5.5 L20 6 L18.5 6.5 L18 8 L17.5 6.5 L16 6 L17.5 5.5 Z"/></svg></span><span>助手</span>
  </button>
  <button class="tab" data-tab="settings" aria-label="设置">
    <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1.08-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1.08 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.08a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.08a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span><span>设置</span>
  </button>
</nav>

<!-- 隐藏的文件输入 -->
<input type="file" id="img-input" accept="image/*" class="hidden">
<input type="file" id="json-input" accept="application/json" class="hidden">

<!-- Toast -->
<div class="toast" id="toast"></div>

<!--
  src/*.js 是按职责拆分的「经典脚本」，共享同一个全局作用域，按下方顺序依次同步执行。
  注意：函数声明的提升（hoisting）不跨 <script> 文件边界。某个文件里在「加载时立即执行」
  的顶层语句，只能调用本文件或更靠前文件中定义的函数；若需调用更靠后文件的函数，请把该调用
  推迟到 15-boot.js 的启动流程里执行。（例：state 的初始化放在 03-utils.js 末尾。）
  顺序不可随意调整；新增文件请插到合适位置并保持依赖在前。
-->
<script src="src/01-splash.js"></script>
<script src="src/02-config-state.js"></script>
<script src="src/03-utils.js"></script>
<script src="src/04-snail-achievements.js"></script>
<script src="src/05-focus-memos.js"></script>
<script src="src/06-cloud-auth.js"></script>
<script src="src/07-core-parse.js"></script>
<script src="src/08-input-import.js"></script>
<script src="src/09-task-core.js"></script>
<script src="src/10-render-flows.js"></script>
<script src="src/11-defer-swipe.js"></script>
<script src="src/12-stats-assistant.js"></script>
<script src="src/13-settings.js"></script>
<script src="src/14-export-render.js"></script>
<script src="src/15-boot.js"></script>
<script src="src/16-focus-timer.js"></script>
</body>
</html>
