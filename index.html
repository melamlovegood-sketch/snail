<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<!-- 禁止浏览器/中间代理缓存 index.html，确保 PWA 部署后用户拿到最新版本 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<!-- 衬线字体：用于页面大标题，营造手账/出版物质感；系统中文衬线字体先 fallback -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
<title>每日计划</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===================== 设计系统（手账风格：温润、安静、有呼吸感）===================== */
:root {
  /* 暖米白底，不要纯白 */
  --bg: #FAF9F6;
  --bg-elev: #FFFFFF;
  --bg-soft: #F4F2EE;
  --text: #2B2926;
  --text-soft: #7A766F;
  --text-faint: #B8B3AB;
  --border: rgba(0,0,0,0.06);
  --border-soft: rgba(0,0,0,0.04);
  --shadow: none;
  --shadow-lg: 0 1px 2px rgba(0,0,0,0.04);
  /* 主强调色：温润赭褐 */
  --accent: #9B6B3F;
  --accent-text: #FFFFFF;
  --accent-soft: rgba(155,107,63,0.10);

  --radius: 8px;
  --radius-sm: 6px;
  --radius-lg: 12px;

  /* 分类色（莫兰迪低饱和） */
  --cat-s: #7A8B99;
  --cat-r: #8B7B9B;
  --cat-g: #8B9B7A;
  --cat-c: #B89B7A;

  /* 优先级色（柔和版四象限） */
  --pri-urgent-important: #A66B5D;
  --pri-urgent-unimportant: #B89668;
  --pri-important: #7A8B99;
  --pri-normal: #9BA88E;

  --deadline-safe: #9BA88E;
  --deadline-warn: #B89668;
  --deadline-danger: #A66B5D;
}
[data-theme="dark"] {
  /* 暖黑底，不是纯黑 */
  --bg: #1C1A17;
  --bg-elev: #262320;
  --bg-soft: #2E2A26;
  --text: #EBE7E0;
  --text-soft: #9B968D;
  --text-faint: #5C5852;
  --border: rgba(255,255,255,0.06);
  --border-soft: rgba(255,255,255,0.04);
  --shadow: none;
  --shadow-lg: 0 1px 2px rgba(0,0,0,0.20);
  --accent: #B88458;   /* 深色模式微提亮的赭褐 */
  --accent-text: #1C1A17;
  --accent-soft: rgba(184,132,88,0.14);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }

/* ===================== iOS PWA 输入修复（必须 ≥16px，否则 Safari 会触发自动缩放+焦点失灵）===================== */
input, textarea, select {
  font-size: 16px;
  -webkit-user-select: text;
  user-select: text;
  -webkit-tap-highlight-color: rgba(0,0,0,0);
  -webkit-touch-callout: default;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
}
/* date/time/number 保留 iOS 原生选择器外观 */
input[type=date], input[type=time], input[type=datetime-local], input[type=month] {
  -webkit-appearance: none;
  appearance: none;
  background-clip: padding-box;
  min-height: 44px;
}
button { touch-action: manipulation; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom);
}
input, textarea, button, select { font-family: inherit; color: inherit; }
button { cursor: pointer; border: none; background: none; padding: 0; }

/* ===================== 排版 =====================
 * h1/h2 用衬线字体，营造手账/出版物质感
 * h3 及正文用系统无衬线，保持现代可读性
 */
.serif, h1, h2 {
  font-family: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', 'STSong', 'SimSun', serif;
  font-weight: 400;
  letter-spacing: 0;
}
h1 { font-size: 28px; line-height: 1.4; margin: 0; }
h2 { font-size: 20px; line-height: 1.4; margin: 0; }
h3 {
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0;
  margin: 0;
}
.text-soft { color: var(--text-soft); }
.text-faint { color: var(--text-faint); }
.text-sm { font-size: 13px; }
.text-xs { font-size: 12px; }

/* ===================== 布局 ===================== */
.app {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 20px calc(110px + env(safe-area-inset-bottom)) 20px;
}
.header {
  padding: 4px 0 32px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.header .date {
  color: var(--text-soft);
  font-size: 13px;
  margin-top: 8px;
  letter-spacing: 0.02em;
}

/* ===================== Tab 导航（细线风格 + 顶部短横线指示器）===================== */
.tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg-elev);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 4px 4px calc(4px + env(safe-area-inset-bottom)) 4px;
  z-index: 100;
}
.tabbar .tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 10px 4px 6px 4px;
  min-height: 44px;
  color: var(--text-faint);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.04em;
  background: transparent;
  border: none;
  position: relative;
  transition: color 0.25s ease;
}
.tabbar .tab .icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tabbar .tab .icon svg {
  width: 20px;
  height: 20px;
  stroke-width: 1.5;
}
.tabbar .tab.active { color: var(--text); }
.tabbar .tab.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 18px;
  height: 2px;
  border-radius: 0 0 1px 1px;
  background: var(--accent);
}

/* ===================== 输入区 ===================== */
.input-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 24px;
  position: relative;
}
.input-bar input {
  flex: 1;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 14px;
  font-size: 16px;
  min-height: 46px;
  outline: none;
  transition: border-color 0.25s ease;
}
.input-bar input:focus { border-color: var(--text-soft); }
.input-bar.drag-over {
  outline: 1px dashed #9B6B3F;
  outline-offset: 2px;
  background: rgba(155,107,63,0.05);
  border-radius: var(--radius);
}
.drag-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #9B6B3F;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.05em;
  pointer-events: none;
  z-index: 10;
  background: rgba(155,107,63,0.08);
  border-radius: var(--radius);
}
.btn-icon {
  width: 46px; height: 46px;
  border-radius: var(--radius);
  background: var(--bg-elev);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  color: var(--text-soft);
  transition: background 0.25s ease, color 0.25s ease;
}
.btn-icon:hover { background: var(--bg-soft); color: var(--text); }
.btn-primary {
  background: var(--accent);
  color: var(--accent-text);
  border: none;
  padding: 11px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  min-height: 44px;
  letter-spacing: 0.02em;
  transition: background 0.25s ease;
}
.btn-primary:hover { background: color-mix(in srgb, var(--accent) 88%, var(--text)); }
.btn-secondary {
  background: var(--bg-soft);
  color: var(--text);
  border: none;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  min-height: 44px;
  letter-spacing: 0.02em;
  transition: background 0.25s ease;
}
.btn-secondary:hover { background: var(--border); }

/* ===================== 任务分组 ===================== */
.task-group {
  margin-bottom: 32px;
}
.task-group-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 12px;
  padding: 0 4px;
}
.task-group-header .date-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-soft);
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

/* ===================== 任务卡片 ===================== */
.task-card {
  background: var(--bg-elev);
  border-radius: var(--radius);
  padding: 16px 16px 16px 19px;   /* 左侧 16+3 给 pri-edge 让位 */
  margin-bottom: 12px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  border: 1px solid var(--border);
  transition: background 0.25s ease, border-color 0.25s ease;
  position: relative;
}
.task-card.done { opacity: 0.55; }
.task-card.done .task-desc { text-decoration: line-through; }

/* 左侧 3px 细色条：替代以前的色点 */
.pri-edge {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 16px;             /* 16px 点击区，3px 可见 */
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 0;
}
.pri-edge::before {
  content: '';
  position: absolute;
  left: 0;
  top: 14px;
  bottom: 14px;
  width: 3px;
  border-radius: 1.5px;
  background: var(--text-faint);
  transition: width 0.25s ease, background 0.25s ease;
}
.pri-edge:hover::before { width: 4px; }
.task-card[data-priority="urgent-important"] .pri-edge::before { background: var(--pri-urgent-important); }
.task-card[data-priority="urgent-unimportant"] .pri-edge::before { background: var(--pri-urgent-unimportant); }
.task-card[data-priority="important"] .pri-edge::before { background: var(--pri-important); }
.task-card[data-priority="normal"] .pri-edge::before { background: var(--pri-normal); }

/* 旧 .pri-dot 仍保留：用于循环任务卡片、日程时间轴等其它视觉位置 */
.pri-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.pri-dot.pri-urgent-important { background: var(--pri-urgent-important); }
.pri-dot.pri-urgent-unimportant { background: var(--pri-urgent-unimportant); }
.pri-dot.pri-important { background: var(--pri-important); }
.pri-dot.pri-normal { background: var(--pri-normal); }

.task-main {
  flex: 1;
  min-width: 0;
}
.task-row1 {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.task-desc {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  word-break: break-word;
  flex: 1;            /* 占满 row1 剩余宽度 */
  min-width: 0;       /* 允许收缩并正常断词 */
  line-height: 1.5;
}
.task-row2 {
  display: flex;
  align-items: center;
  gap: 8px;
  row-gap: 6px;
  font-size: 12px;
  color: var(--text-soft);
  flex-wrap: wrap;    /* 计时器宽时自动换行到下一行 */
}
.cat-tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  border-radius: 4px;       /* 接近方形，克制 */
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  min-height: 20px;
  user-select: none;
  letter-spacing: 0.02em;
}
.cat-tag[data-cat="S"] { background: rgba(122,139,153,0.14); color: var(--cat-s); }
.cat-tag[data-cat="R"] { background: rgba(139,123,155,0.14); color: var(--cat-r); }
.cat-tag[data-cat="G"] { background: rgba(139,155,122,0.14); color: var(--cat-g); }
.cat-tag[data-cat="C"] { background: rgba(184,155,122,0.14); color: var(--cat-c); }

.time-tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  background: var(--bg-soft);
  color: var(--text);
  font-variant-numeric: tabular-nums;
  border: none;
  letter-spacing: 0.02em;
}
.time-label-tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 12px;
  background: rgba(155,107,63,0.08);
  color: #9B6B3F;
  border: none;
  cursor: pointer;
  letter-spacing: 0.02em;
}
.time-label-pop {
  position: absolute;
  z-index: 9999;
  background: #fff;
  border: 1px solid var(--border-soft);
  border-radius: 8px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.08);
  padding: 10px 12px;
  min-width: 200px;
  font-size: 12px;
  color: #7A766F;
}
.time-label-pop .tlp-range { color: #7A766F; font-size: 12px; margin-bottom: 8px; }
.time-label-pop .tlp-row { display: flex; gap: 6px; align-items: center; }
.time-label-pop input[type="time"] {
  flex: 1;
  padding: 4px 6px;
  border: 1px solid var(--border-soft);
  border-radius: 4px;
  font-size: 12px;
  min-height: 0;
}
.time-label-pop button {
  padding: 4px 8px;
  border-radius: 4px;
  border: none;
  background: #9B6B3F;
  color: #fff;
  font-size: 12px;
  cursor: pointer;
}
.deadline-tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  background: rgba(155,168,142,0.16);
  color: var(--deadline-safe);
}
.deadline-tag.warn { background: rgba(184,150,104,0.16); color: var(--deadline-warn); }
.deadline-tag.danger { background: rgba(166,107,93,0.16); color: var(--deadline-danger); }
.deadline-tag.overdue { background: rgba(166,107,93,0.22); color: var(--deadline-danger); font-weight: 600; }

.rollover-tag {
  display: inline-flex;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 11px;
  background: var(--bg-soft);
  color: var(--text-soft);
  letter-spacing: 0.02em;
}
.procrastinate-tag {
  display: inline-flex;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  background: rgba(184,150,104,0.18);
  color: var(--pri-urgent-unimportant);
}
.decomposed-tag {
  display: inline-flex;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 11px;
  background: rgba(139,123,155,0.16);
  color: var(--cat-r);
}
/* ===== 警告 / 早间规划横幅 ===== */
.warn-banner {
  background: rgba(184,150,104,0.08);
  border: 1px solid rgba(184,150,104,0.25);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.warn-banner .body { flex: 1; min-width: 0; }
.warn-banner .body .t { font-size: 14px; font-weight: 500; color: var(--text); }
.warn-banner .body .d { font-size: 12px; color: var(--text-soft); margin-top: 4px; }
.morning-banner {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 14px;
  position: relative;
}
.morning-banner h3 { margin-bottom: 6px; font-size: 16px; }
.morning-banner .advice {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  margin: 0 0 12px 0;
  white-space: pre-wrap;
}
.morning-banner .actions { display: flex; gap: 8px; }
.morning-banner .close-x {
  position: absolute;
  top: 10px; right: 10px;
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: var(--text-faint);
  background: transparent;
  border: none;
}
.morning-banner .close-x:hover { background: var(--bg-soft); color: var(--text); }

/* 撤销条：自然语言操作后短暂出现，可点击撤销 */
.undo-banner {
  background: var(--accent-soft);
  border: 1px solid rgba(155,107,63,0.20);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.undo-banner .msg { flex: 1; min-width: 0; font-size: 13px; color: var(--text); line-height: 1.5; }

/* ===================== 今日专注 ===================== */
.focus-block {
  border: 1px solid #9B6B3F;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 16px;
  background: var(--bg-elev);
}
.focus-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 10px;
  padding: 0 2px;
}
.focus-title {
  font-family: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', serif;
  font-size: 16px;
  font-weight: 500;
  color: #2B2926;
  margin: 0;
  letter-spacing: 0.01em;
}
.focus-count {
  font-size: 12px;
  color: #7A766F;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}
.focus-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 14px 0 6px 0;
}
.focus-empty-text {
  color: #7A766F;
  font-size: 14px;
  text-align: center;
}
.focus-smart-btn {
  background: transparent;
  border: 1px solid #9B6B3F;
  color: #9B6B3F;
  border-radius: 6px;
  padding: 4px 12px;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.25s ease;
  min-height: 0;
}
.focus-smart-btn:hover {
  background: rgba(155,107,63,0.08);
}
.focus-hint {
  margin-top: 12px;
  text-align: center;
  font-size: 12px;
  color: #B8B3AB;
  letter-spacing: 0.02em;
  padding: 0 8px;
}
/* 专注块内的任务卡片：边框去掉避免双重描边，加 📌 active 颜色 */
.focus-block .task-card {
  border-color: var(--border-soft);
}
.focus-block .task-card .icon-btn.pin-active {
  color: #9B6B3F;
}
.icon-btn.pin-active { color: #9B6B3F; }

/* ===================== 输入模式切换（任务 / 记一笔） ===================== */
.input-mode-tabs {
  display: flex;
  gap: 4px;
  margin: -16px 0 16px 2px;   /* 紧贴上方 input-bar，向上吸附 */
}
.input-mode-tab {
  background: transparent;
  border: none;
  padding: 4px 0;
  margin-right: 16px;
  font-size: 12px;
  color: var(--text-faint);
  letter-spacing: 0.04em;
  cursor: pointer;
  font-family: inherit;
  position: relative;
  transition: color 0.2s ease;
  min-height: 0;
}
.input-mode-tab:hover { color: var(--text-soft); }
.input-mode-tab.active { color: var(--accent); }
.input-mode-tab.active::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 1px;
  background: var(--accent);
}

/* ===================== 备忘块 ===================== */
.memo-block {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 24px;
}
.memo-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.memo-title {
  font-family: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  margin: 0;
  letter-spacing: 0.01em;
}
.memo-head-right {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-soft);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}
.memo-fold {
  font-size: 11px;
  color: var(--text-faint);
  transition: transform 0.25s ease;
  display: inline-block;
}
.memo-block.collapsed .memo-fold { transform: rotate(-90deg); }
.memo-list {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.memo-block.collapsed .memo-list { display: none; }
.memo-empty {
  margin-top: 10px;
  padding: 8px 0 2px 0;
  font-size: 13px;
  color: var(--text-faint);
  letter-spacing: 0.02em;
}
.memo-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 4px;
  border-top: 1px solid var(--border-soft);
}
.memo-card:first-child { border-top: none; padding-top: 6px; }
.memo-card.pinned {
  background: var(--accent-soft);
  border-radius: 6px;
  padding-left: 10px;
  padding-right: 8px;
  border-top-color: transparent;
}
.memo-card.pinned + .memo-card { border-top-color: transparent; }
.memo-ts {
  flex-shrink: 0;
  font-size: 11px;
  color: var(--text-soft);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
  line-height: 1.5;
  padding-top: 2px;
  min-width: 52px;
}
.memo-pin-mark {
  color: var(--accent);
  font-size: 10px;
  margin-right: 3px;
}
.memo-content {
  flex: 1;
  min-width: 0;
  font-size: 14px;
  color: var(--text);
  line-height: 1.55;
  word-break: break-word;
  white-space: pre-wrap;
}
.memo-actions {
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
}
.memo-action-btn {
  background: transparent;
  border: none;
  color: var(--text-faint);
  font-size: 12px;
  padding: 4px 6px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.02em;
  min-height: 0;
  transition: color 0.2s ease, background 0.2s ease;
}
.memo-action-btn:hover { color: var(--text); background: var(--bg-soft); }
.memo-action-btn.pinned { color: var(--accent); }

/* 截图导入：分组多选 */
.import-group { margin-bottom: 18px; }
.import-group:last-child { margin-bottom: 0; }
.import-group-head {
  padding-bottom: 8px;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.recur-tag {
  display: inline-flex;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 11px;
  background: var(--bg-soft);
  color: var(--text-soft);
  letter-spacing: 0.02em;
}

/* ===================== 计时器 ===================== */
.timer-area {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  margin-left: auto;   /* 推到 row2 最右；空间不够时整体换行到下一行 */
}
.timer-area:empty { display: none; }   /* 没计时按钮时不占位 */
.timer-display {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  min-width: 50px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.timer-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: background 0.15s;
  border: 1px solid var(--border-soft);
}
.timer-btn:hover { background: var(--border); }
.timer-btn.running { background: var(--accent); color: var(--accent-text); }
.task-actions {
  display: flex;
  gap: 2px;
  align-items: center;
  flex-shrink: 0;     /* row1 永远不被压缩，desc 拿到剩余宽度 */
}
.icon-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--text-soft);
  transition: background 0.15s;
}
.icon-btn:hover { background: var(--bg-soft); }
.icon-btn.is-fav { color: var(--accent); font-size: 16px; }
.complete-btn {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  margin-top: 3px;
  flex-shrink: 0;
  background: transparent;
  transition: all 0.25s ease;
  position: relative;
}
.complete-btn:hover { border-color: var(--text-soft); }
.task-card.done .complete-btn {
  background: var(--accent);
  border-color: var(--accent);
}
.task-card.done .complete-btn::after {
  /* 细线钩号：通过两条 border 拼出 */
  content: '';
  position: absolute;
  top: 45%;
  left: 52%;
  width: 4px;
  height: 8px;
  border: solid var(--accent-text);
  border-width: 0 1.5px 1.5px 0;
  transform: translate(-50%, -50%) rotate(45deg);
}

/* ===================== 弹出菜单 ===================== */
.popover {
  position: absolute;
  z-index: 200;
  background: var(--bg-elev);
  border-radius: var(--radius);
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  border: 1px solid var(--border);
  padding: 6px;
  min-width: 180px;
}
.popover .pop-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  min-height: 40px;
  transition: background 0.25s ease;
}
.popover .pop-item:hover { background: var(--bg-soft); }
.popover .pop-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ===================== 模态框 ===================== */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(43,41,38,0.30);
  backdrop-filter: blur(0);   /* 不用毛玻璃 */
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
[data-theme="dark"] .modal-backdrop { background: rgba(0,0,0,0.55); }
.modal {
  background: var(--bg-elev);
  border-radius: var(--radius-lg);
  max-width: 520px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 28px 24px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
}
.modal h2 { margin-bottom: 20px; }
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 24px;
}
.modal-list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--bg-soft);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}
.modal-list-item input[type=checkbox] {
  width: 20px; height: 20px;
  flex-shrink: 0;
}
.modal-list-item input[type=text], .modal-list-item input[type=number] {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  min-height: 40px;
  font-size: 16px;
}

/* ===================== 设置页 ===================== */
.settings-section {
  background: var(--bg-elev);
  border-radius: var(--radius);
  padding: 4px 16px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border-soft);
  gap: 12px;
  min-height: 48px;
}
.settings-row:last-child { border-bottom: none; }
.settings-row .label { font-size: 14px; }
.settings-row .desc { font-size: 12px; color: var(--text-soft); margin-top: 2px; }
.section-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-soft);
  margin: 24px 4px 8px 4px;
}
.seg-control {
  display: inline-flex;
  background: var(--bg-soft);
  border-radius: 8px;
  padding: 2px;
}
.seg-control button {
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--text-soft);
  min-height: 32px;
}
.seg-control button.active {
  background: var(--bg-elev);
  color: var(--text);
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

/* ===================== 详情模态框表单 ===================== */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 12px;
  color: var(--text-soft);
  margin-bottom: 6px;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.form-group input[type=text],
.form-group input[type=number],
.form-group input[type=date],
.form-group input[type=time],
.form-group textarea {
  width: 100%;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 16px;
  outline: none;
  color: var(--text);
  font-family: inherit;
  transition: border-color 0.15s;
  min-height: 44px;
}
.form-group input:focus, .form-group textarea:focus {
  border-color: var(--accent);
}
.form-group textarea { resize: vertical; min-height: 72px; }
.form-row { display: flex; gap: 12px; margin-bottom: 0; }
.form-row .form-group { flex: 1; }
.td-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.td-chips button {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  background: var(--bg-soft);
  border: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-soft);
  min-height: 40px;
  transition: all 0.15s;
}
.td-chips button.active {
  background: var(--accent);
  color: var(--accent-text);
  border-color: var(--accent);
}
.task-main { cursor: pointer; }

textarea.api-input {
  width: 100%;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 16px;
  font-family: ui-monospace, monospace;
  min-height: 60px;
  resize: vertical;
  outline: none;
}

/* ===================== 统计页 ===================== */
.stat-tabs {
  display: flex;
  background: var(--bg-soft);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 20px;
}
.stat-tabs button {
  flex: 1;
  padding: 10px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-soft);
  min-height: 40px;
}
.stat-tabs button.active {
  background: var(--bg-elev);
  color: var(--text);
}
.chart-card {
  background: var(--bg-elev);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}
.chart-card h3 { margin-bottom: 16px; }
/* Chart.js 必须有显式高度的父容器，否则 responsive 模式下会无限撑高 */
.chart-wrap {
  position: relative;
  width: 100%;
  height: 280px;
  margin-bottom: 4px;
}
.chart-wrap.tall { height: 320px; }
.chart-empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-faint);
  font-size: 14px;
  text-align: center;
}
.cat-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 12px;
  justify-content: center;
}
.cat-legend .item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
}
.cat-legend .swatch { width: 10px; height: 10px; border-radius: 50%; }

.ai-summary-area {
  background: var(--bg-elev);
  border-radius: var(--radius);
  padding: 20px;
  border: 1px solid var(--border-soft);
}
.ai-result {
  margin-top: 16px;
  padding: 16px;
  background: var(--bg-soft);
  border-radius: var(--radius-sm);
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
}

/* ===================== 日程时间轴 ===================== */
.schedule-item {
  display: flex;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border-soft);
}
.schedule-time {
  font-size: 13px;
  color: var(--text-soft);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  width: 100px;
}
.schedule-content { flex: 1; }
.schedule-break {
  color: var(--text-faint);
  font-style: italic;
  font-size: 13px;
}

/* ===================== 循环任务 ===================== */
.recur-card {
  background: var(--bg-elev);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 8px;
  border: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  gap: 12px;
}
.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-size: 12px;
  color: var(--text-soft);
  background: var(--bg-soft);
  padding: 2px 8px;
  border-radius: 12px;
}

/* ===================== 空状态 ===================== */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-faint);
}
.empty .big { font-size: 40px; margin-bottom: 12px; }

/* ===================== 收藏 ===================== */
.fav-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
  background: var(--bg-soft);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  gap: 8px;
}
.fav-row .fav-desc { flex: 1; font-size: 14px; }
.fav-row .fav-meta { font-size: 12px; color: var(--text-soft); }

/* ===================== AI 助手对话 ===================== */
.chat-scroll {
  background: var(--bg-elev);
  border-radius: var(--radius);
  border: 1px solid var(--border-soft);
  padding: 16px;
  min-height: 380px;
  max-height: calc(100vh - 280px);
  overflow-y: auto;
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.chat-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  text-align: center;
  color: var(--text-faint);
}
.chat-empty .big { font-size: 32px; margin-bottom: 12px; opacity: 0.6; }
.chat-empty .hint { font-size: 13px; margin-bottom: 20px; }
.chat-suggestions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 360px;
}
.chat-suggestion {
  background: var(--bg-soft);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text);
  text-align: left;
  min-height: 40px;
  transition: background 0.15s;
}
.chat-suggestion:hover { background: var(--border); }

.chat-msg { display: flex; }
.chat-msg.user { justify-content: flex-end; }
.chat-msg.assistant { justify-content: flex-start; }
.chat-msg .bubble {
  max-width: 82%;
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.chat-msg.user .bubble {
  background: var(--accent);
  color: var(--accent-text);
  border-bottom-right-radius: 4px;
}
.chat-msg.assistant .bubble {
  background: var(--bg-soft);
  color: var(--text);
  border-bottom-left-radius: 4px;
}
.chat-msg.loading .bubble {
  color: var(--text-soft);
  font-style: italic;
}
.chat-input-bar {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.chat-input-bar textarea {
  flex: 1;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  font-size: 16px;
  outline: none;
  font-family: inherit;
  resize: none;
  min-height: 48px;
  max-height: 160px;
  line-height: 1.5;
  color: var(--text);
  transition: border-color 0.15s;
}
.chat-input-bar textarea:focus { border-color: var(--accent); }
.chat-input-bar button { flex-shrink: 0; }
.chat-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  font-size: 12px;
  color: var(--text-soft);
}
.chat-toolbar .meta { font-variant-numeric: tabular-nums; }
.checkin-btn { display:inline-flex; align-items:center; gap:8px; }
.checkin-btn .rate {
  font-size: 12px;
  background: var(--bg);
  color: var(--text-soft);
  padding: 1px 6px;
  border-radius: 4px;
  font-variant-numeric: tabular-nums;
}
.checkin-btn.is-active { background: var(--accent-soft); color: var(--accent); }
.checkin-btn.is-active .rate { background: var(--bg-elev); }

/* ===================== Toast ===================== */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--bg);
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 14px;
  z-index: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

/* ===================== Loading ===================== */
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none !important; }

/* ===================== 开屏动画 ===================== */
.splash-screen {
  position: fixed;
  inset: 0;
  background: #F5EFE6;
  z-index: 9999;
  overflow: hidden;
  cursor: pointer;
  transition: opacity 0.4s ease-in;
  -webkit-tap-highlight-color: transparent;
}
.splash-screen.splash-fade {
  opacity: 0;
  pointer-events: none;
}
.splash-content {
  position: absolute;
  inset: 0;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
/* 外层：负责弧线爬行轨迹 */
.splash-snail-path {
  animation: splash-snail-crawl 1.2s cubic-bezier(0.25, 0.1, 0.25, 1) both;
  will-change: transform, opacity;
}
/* 内层：负责上下摆动模拟爬行感（爬行期间播放 4 次往返） */
.splash-snail-bob {
  animation: splash-snail-bob 0.3s ease-in-out 4 alternate;
}
.splash-snail-svg {
  width: 100px;
  height: 80px;
  display: block;
}
@keyframes splash-snail-crawl {
  0%   { transform: translate(-55vw, 35vh) rotate(-5deg); opacity: 0; }
  18%  { opacity: 1; }
  100% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
}
@keyframes splash-snail-bob {
  from { transform: translateY(0); }
  to   { transform: translateY(-3px); }
}

/* 文字三段依次淡入 */
.splash-brand {
  font-family: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', Georgia, serif;
  font-size: 36px;
  font-weight: 400;
  color: #2B2926;
  margin: 0;
  line-height: 1;
  opacity: 0;
  transform: translateY(8px);
  animation: splash-fade-up 0.4s ease-out 1.2s forwards;
}
.splash-sub {
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: #7A766F;
  letter-spacing: 0.05em;
  margin: 0;
  opacity: 0;
  transform: translateY(8px);
  animation: splash-fade-up 0.4s ease-out 1.4s forwards;
}
.splash-credit {
  position: absolute;
  bottom: calc(40px + env(safe-area-inset-bottom));
  left: 50%;
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  font-size: 11px;
  color: #B8B3AB;
  opacity: 0;
  transform: translate(-50%, 8px);
  animation: splash-fade-up-credit 0.4s ease-out 1.6s forwards;
  letter-spacing: 0.03em;
}
@keyframes splash-fade-up {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes splash-fade-up-credit {
  to { opacity: 1; transform: translate(-50%, 0); }
}

/* ===================== 登录覆盖层 ===================== */
.auth-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.auth-card {
  width: 100%;
  max-width: 360px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.auth-title {
  font-family: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', serif;
  font-size: 28px;
  font-weight: 400;

  transform: scale(1);
  transform-origin: center;
}
.snail-status .snail-svg.exiting {
  opacity: 0;
}
.snail-status .snail-svg.entering {
  opacity: 0;
  transform: scale(0.95);
}
.snail-status .snail-svg.entering.active {
  opacity: 1;
  transform: scale(1);
}

  transform-origin: center;

.snail-status .bloom-flower.f2 { animation-delay: 0.18s; }

  60% { transform: scale(1.15); }

/* =====================================================================
 * Chronos Butler - 个人时间管理 PWA
 * 设计哲学：克制、简洁、有重量感
 * ===================================================================== */

/* ╔══════════════════════════════════════════════════════════════════╗
 * ║ SPLASH DISMISS — 必须放在 <script> 第一行，独立 IIFE             ║
 * ║                                                                  ║
 * ║ 之前的卡死原因：splash dismiss setTimeout 注册在脚本第 5300+ 行， ║
 * ║ 如果脚本顶部任何同步代码（如 loadState）抛未捕获错误，主脚本会   ║
 * ║ 提前中断，setTimeout 永远不被排队，splash 永远不消失。           ║
 * ║                                                                  ║
 * ║ 修复策略：把 setTimeout 提前到脚本第一行 IIFE，独立自包含：      ║
 * ║   - 不依赖任何函数、变量、Promise、事件                         ║
 * ║   - 不依赖 DOMContentLoaded（脚本在 body 末尾，splash 已经存在） ║
 * ║   - 即使后面所有代码崩了，splash 也会 2.4s 后消失                ║
 * ║   - 写法用 var + function() {}，绕开任何 TDZ / closure 问题      ║
 * ╚══════════════════════════════════════════════════════════════════╝ */
(function () {
  setTimeout(function () {
    var splash = document.getElementById('splash');
    var main = document.querySelector('.app');
    var tabbar = document.querySelector('.tabbar');
    console.log('[Splash] 2s 计时到，准备淡出; splash =', splash, '; main =', main, '; tabbar =', tabbar);
    if (!splash) {
      // splash 元素不存在时立刻显示主界面
      if (main) main.style.display = '';
      if (tabbar) tabbar.style.display = '';
      return;
    }
    splash.style.transition = 'opacity 0.4s ease-out';
    splash.style.opacity = '0';
    setTimeout(function () {
      splash.style.display = 'none';
      if (main) { main.style.display = ''; main.style.opacity = '1'; }
      if (tabbar) tabbar.style.display = '';
      console.log('[Splash] 已隐藏，主界面已显示');
    }, 400);
  }, 2000);

  // 终极兜底：5 秒后不管发生什么，强制把 splash 干掉
  setTimeout(function () {
    var splash = document.getElementById('splash');
    var main = document.querySelector('.app');
    var tabbar = document.querySelector('.tabbar');
    if (splash && splash.style.display !== 'none') {
      console.warn('[Splash] 5s 终极兜底：强制隐藏');
      splash.style.display = 'none';
    }
    if (main && main.style.display === 'none') main.style.display = '';
    if (tabbar && tabbar.style.display === 'none') tabbar.style.display = '';
  }, 5000);
})();

/* ---------------- 工具函数 ---------------- */
function uid() {
  // 优先用 RFC 4122 v4 UUID，兼容 Supabase 的 uuid 列
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = (Math.random() * 16) | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}
function isUuid(s) { return typeof s === 'string' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s); }
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dateAdd(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function diffDays(a, b) {
  const da = new Date(a), db = new Date(b);
  return Math.round((db - da) / 86400000);
}
function weekday(dateStr) {
  return new Date(dateStr).getDay(); // 0 Sun ... 6 Sat
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  const today = todayStr();
  if (dateStr === today) return '今天';
  if (dateStr === dateAdd(today, 1)) return '明天';
  if (dateStr === dateAdd(today, 2)) return '后天';
  if (dateStr === dateAdd(today, -1)) return '昨天';
  const d = new Date(dateStr);
  return `${d.getMonth()+1}月${d.getDate()}日 周${'日一二三四五六'[d.getDay()]}`;
}
function fmtDur(min) {
  if (min == null) return '';
  if (min < 60) return `${min}分钟`;
  const h = Math.floor(min/60), m = min % 60;
  return m ? `${h}h${m}m` : `${h}h`;
}
function fmtTimer(ms) {
  const s = Math.floor(ms/1000);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}
/**
 * 数据持久化策略（重要）：
 * - 唯一的 localStorage 键是 'chronos_state'，由 saveState/loadState 管理。
 * - 代码更新（新版 index.html、新 SW 缓存版本）永远不会清空用户数据。
 * - 只有用户在「设置」点击「清空所有数据」按钮（带 confirm）才会删 key。
 * - 解析失败时，原始数据不会被覆盖：会另存为 chronos_state_corrupted_*
 *   作为应急备份，主键暂时回退到默认状态，便于用户继续使用。
 * - importData 也会先把现有数据备份到 chronos_state_backup_* 再覆盖。
 */
// 计时字段补齐：老版本数据可能缺 timerState/timerStart/timerPaused，
// 导致 taskCardHTML 里 `t.timerState === 'idle'` 判定失败 → 不显示播放按钮
function normalizeTaskTimer(t, isDoneArr) {
  if (t.timerState !== 'running' && t.timerState !== 'paused' && t.timerState !== 'done') {
    t.timerState = isDoneArr ? 'done' : (t.durActual != null ? 'done' : 'idle');
  }
  if (t.timerStart === undefined) t.timerStart = null;
  if (t.timerPaused === undefined) t.timerPaused = 0;
}
function loadState() {
  let raw;
  try {
    raw = localStorage.getItem('chronos_state');
  } catch(e) {
    console.warn('[Chronos] localStorage 不可用，回退到内存模式', e);
    return JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
  if (raw == null) return JSON.parse(JSON.stringify(DEFAULT_STATE));
  try {
    const s = JSON.parse(raw);
    if (!s || typeof s !== 'object') throw new Error('state 不是对象');
    // 浅合并：新版本新增的字段自动获得默认值，已有用户数据完整保留
    const merged = { ...JSON.parse(JSON.stringify(DEFAULT_STATE)), ...s };
    if (Array.isArray(merged.tasks)) merged.tasks.forEach(t => normalizeTaskTimer(t, false));
    if (Array.isArray(merged.done)) merged.done.forEach(t => normalizeTaskTimer(t, true));
    return merged;
  } catch(e) {
    console.error('[Chronos] chronos_state 解析失败，已备份到 chronos_state_corrupted_*', e);
    try {
      const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
      localStorage.setItem('chronos_state_corrupted_' + ts, raw);
    } catch(_) {}
    return JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
}

}

function loadSnailMileage() {
  let raw;
  try { raw = localStorage.getItem('snail_mileage'); } catch(_) { raw = null; }
  if (!raw) return { total: 0, dailyLog: {} };
  try {
    const obj = JSON.parse(raw);
    if (!obj || typeof obj !== 'object') return { total: 0, dailyLog: {} };
    return {
      total: Number(obj.total) || 0,
      dailyLog: (obj.dailyLog && typeof obj.dailyLog === 'object') ? obj.dailyLog : {}
    };
  } catch(_) {
    return { total: 0, dailyLog: {} };
  }
}

function computeTodayCompletionRate() {
  const today = todayStr();
  const all = [...state.tasks, ...state.done].filter(t => t.date === today);
  if (all.length === 0) return 0;
  const done = state.done.filter(t => t.date === today).length;
  return done / all.length;
}

function getSnailState(rate) {
  if (rate <= 0) return 'sleeping';
  if (rate >= 1) return 'bloom';
  if (rate <= 0.30) return 'peek';
  if (rate <= 0.60) return 'start';
  return 'speed';
}

/* 更新 header 蜗牛状态，带淡出/淡入 + scale 弹入动画 */
function updateSnailStatus(forceImmediate) {
  const root = document.getElementById('snail-status');
  if (!root) return;
  const rate = computeTodayCompletionRate();
  const newState = getSnailState(rate);
  if (!forceImmediate && _prevSnailState === newState && root.firstChild) return;

  const oldSvgWrap = root.querySelector('.snail-svg');
  const newWrap = document.createElement('div');
  newWrap.className = 'snail-svg entering';
  newWrap.innerHTML = snailStatusSVG(newState);

  if (oldSvgWrap && !forceImmediate) {
    // 淡出旧的
    oldSvgWrap.classList.add('exiting');
    setTimeout(() => {
      try { oldSvgWrap.remove(); } catch(_) {}
    }, 320);
    // 重叠：旧的还在淡出时插入新的（绝对定位避免抖动）
    newWrap.style.position = 'absolute';
    newWrap.style.inset = '0';
    root.appendChild(newWrap);
    requestAnimationFrame(() => {
      newWrap.classList.add('active');
    });
    setTimeout(() => {
      newWrap.style.position = '';
      newWrap.style.inset = '';
    }, 400);
  } else {
    root.innerHTML = '';
    root.appendChild(newWrap);
    requestAnimationFrame(() => {
      newWrap.classList.add('active');
    });
  }
  _prevSnailState = newState;
}

/* 完成任务时调用：按分类加里程 + 计算 100% 奖励 + streak 奖励 */
function awardMileageOnComplete(task) {
  const today = todayStr();
  if (!snailMileage.dailyLog[today]) {
    snailMileage.dailyLog[today] = { earned: 0, completionRate: 0, bonusGiven: false, streakBonusGiven: false };
  }
  const log = snailMileage.dailyLog[today];
  const cat = task && task.cat;
  const base = (cat === 'C') ? 1 : 3; // R/S/G +3，C +1
  log.earned += base;
  snailMileage.total += base;

  // streak 奖励：本日首次完成任意任务 → +1km × streak（包含今天）
  if (!log.streakBonusGiven) {
    // 先把今天的 completionRate 暂存为大于 0 的值，以便 streak 包含今天
    log.completionRate = Math.max(log.completionRate, 0.0001);
    const streak = computeMileageStreak();
    if (streak > 0) {
      log.earned += streak;
      snailMileage.total += streak;
    }
    log.streakBonusGiven = true;
  }

  // 更新真实完成率
  log.completionRate = computeTodayCompletionRate();

  // 100% 奖励：每天只触发一次
  if (log.completionRate >= 1 && !log.bonusGiven) {
    log.earned += 5;
    snailMileage.total += 5;
    log.bonusGiven = true;
  }

  saveSnailMileage(snailMileage);
}

/* 取消完成时调用：只更新当日完成率，不退还里程 */
function recomputeDailyRate() {
  const today = todayStr();
  if (!snailMileage.dailyLog[today]) return;
  snailMileage.dailyLog[today].completionRate = computeTodayCompletionRate();
  saveSnailMileage(snailMileage);
}

/* 计算 streak：从今天往前数连续完成率 > 0 的天数（包含今天） */
function computeMileageStreak() {
  let streak = 0;
  let cursor = todayStr();
  for (let i = 0; i < 365; i++) {
    const log = snailMileage.dailyLog[cursor];
    if (log && log.completionRate > 0) {
      streak++;
      cursor = dateAdd(cursor, -1);
    } else {
      break;
    }
  }
  return streak;
}

/* 蜗牛旅程：统计页顶部组件 */
function renderSnailJourneyHTML() {
  const today = todayStr();
  const days = [];
  for (let i = 29; i >= 0; i--) {
    const d = dateAdd(today, -i);
    const log = snailMileage.dailyLog[d];
    const rate = log ? log.completionRate : 0;
    days.push({ date: d, rate });
  }
  const km = Math.round(snailMileage.total);

  const nodesHTML = days.map((day, idx) => {
    const next = days[idx + 1];
    let gap = 'none';
    if (next) {
      // 当日和次日都完成（rate>0）：实线；否则虚线
      gap = (day.rate > 0 && next.rate > 0) ? 'solid' : 'dashed';
    }
    let flowersHTML;
    if (day.rate >= 1) flowersHTML = '<div class="flowers">✿✿✿</div>';
    else if (day.rate >= 0.61) flowersHTML = '<div class="flowers">✿✿</div>';
    else if (day.rate > 0) flowersHTML = '<div class="flowers">✿</div>';
    else flowersHTML = '<div class="flowers empty"></div>';
    const isToday = day.date === today;
    const dt = new Date(day.date);
    const label = `${dt.getMonth()+1}/${dt.getDate()}`;
    const snailHere = isToday ? `<div class="snail-here">${snailStatusSVG(getSnailState(day.rate))}</div>` : '';
    return `<div class="timeline-node${isToday ? ' today' : ''}" data-gap="${gap}">
      ${snailHere}
      ${flowersHTML}
      <div class="date-label">${label}</div>
    </div>`;
  }).join('');

  return `<div class="snail-journey">
    <div class="snail-journey-mileage">
      <span>🐌 已爬行</span>
      <span class="num">${km}</span>
      <span>km</span>
    </div>
    <div class="snail-journey-timeline" id="snail-journey-timeline">${nodesHTML}</div>
  </div>`;
}

function loadFocusPins() {
  let raw;
  try { raw = localStorage.getItem('snail_focus_pins'); } catch(_) { raw = null; }
  if (!raw) {
    focusPins = [];
    focusHintSeen = false; // 第一次进入 app，显示引导
    return;
  }
  focusHintSeen = true;
  try {
    const obj = JSON.parse(raw);
    if (obj && obj.date === todayStr() && Array.isArray(obj.pinnedIds)) {
      focusPins = obj.pinnedIds.slice(0, 3);
    } else {
      focusPins = []; // 跨日重置 pin，但 hintSeen 保持
    }
  } catch(_) {
    focusPins = [];
  }
}
function saveFocusPins() {
  try {
    localStorage.setItem('snail_focus_pins', JSON.stringify({
      date: todayStr(),
      pinnedIds: focusPins
    }));
    focusHintSeen = true;
  } catch(_) {}
}
function addToFocus(taskId) {
  if (focusPins.includes(taskId)) return;
  if (focusPins.length >= 3) { toast('今天已有3个专注任务，先完成一个吧 🐌'); return; }
  focusPins.push(taskId);
  saveFocusPins();
  render();
}
function removeFromFocus(taskId) {
  focusPins = focusPins.filter(id => id !== taskId);
  saveFocusPins();
  render();
}
function togglePin(taskId) {
  if (focusPins.includes(taskId)) removeFromFocus(taskId);
  else addToFocus(taskId);
}
function smartRecommendFocus() {
  const today = todayStr();
  const todayTasks = state.tasks.filter(t => t.date === today);
  if (todayTasks.length === 0) { toast('今天还没有任务'); return; }
  const order = { 'urgent-important': 0, 'urgent-unimportant': 1, 'important': 2, 'normal': 3 };
  const sorted = todayTasks.slice().sort((a, b) => {
    const pa = order[a.priority] ?? 9, pb = order[b.priority] ?? 9;
    if (pa !== pb) return pa - pb;
    const ta = a.startTime || '~', tb = b.startTime || '~';
    return ta.localeCompare(tb);
  });
  focusPins = sorted.slice(0, 3).map(t => t.id);
  saveFocusPins();
  render();
  toast(`已为你挑选 ${focusPins.length} 件最值得专注的事`);
}

  toast('已记一笔');
}
function togglePinMemo(id) {
  const m = memos.find(x => x.id === id);
  if (!m) return;
  m.pinned = !m.pinned;
  saveMemos();
  render();
}
function archiveMemo(id) {
  const m = memos.find(x => x.id === id);
  if (!m) return;
  m.archived = true;
  saveMemos();
  render();
  toast('已归档');
}
function memoToTask(id) {
  const m = memos.find(x => x.id === id);
  if (!m || m.archived) return;
  // 走原有任务创建流程；handleTextInput 会触发 render
  // 归档由用户手动决定（转为任务后可能仍想保留笔迹），不在这里自动归档
  handleTextInput(m.content);
}
function toggleMemoCollapsed() {
  memoCollapsed = !memoCollapsed;
  render();
}
function setInputMode(mode) {
  if (inputMode === mode) return;
  inputMode = mode;
  render();
  // 切换后聚焦输入框，保持输入手感
  setTimeout(() => {

function fmtMemoTs(ts) {
  const d = new Date(ts);
  const today = todayStr();
  const dStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const hm = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  if (dStr === today) return hm;
  if (dStr === dateAdd(today, -1)) return `昨天 ${hm}`;
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function renderMemoBlock() {
  const active = memos.filter(m => !m.archived);
  if (active.length === 0) {
    // 没有任何活跃备忘时，整块不显示，避免占用视觉空间
    return '';
  }
  const sorted = active.slice().sort((a, b) => {
    if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
    return b.createdAt - a.createdAt;
  });
  const collapsedCls = memoCollapsed ? ' collapsed' : '';
  return `
    <div class="memo-block${collapsedCls}">
      <div class="memo-head" onclick="toggleMemoCollapsed()">
        <h3 class="memo-title">备忘</h3>
        <div class="memo-head-right">
          <span>${active.length}</span>
          <span class="memo-fold">▾</span>
        </div>
      </div>
      <div class="memo-list">
        ${sorted.map(m => `
          <div class="memo-card${m.pinned ? ' pinned' : ''}">
            <div class="memo-ts">${m.pinned ? '<span class="memo-pin-mark">●</span>' : ''}${fmtMemoTs(m.createdAt)}</div>
            <div class="memo-content">${escapeHtml(m.content)}</div>
            <div class="memo-actions">
              <button class="memo-action-btn${m.pinned ? ' pinned' : ''}" onclick="togglePinMemo('${m.id}')" title="${m.pinned ? '取消置顶' : '置顶'}">${m.pinned ? '★' : '☆'}</button>
              <button class="memo-action-btn" onclick="memoToTask('${m.id}')" title="转为任务">→ 任务</button>
              <button class="memo-action-btn" onclick="archiveMemo('${m.id}')" title="归档">归档</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderFocusBlock() {
  const today = todayStr();
  const todayAll = [...state.tasks, ...state.done].filter(t => t.date === today);
  // pinnedIds 按 focusPins 顺序解析为真实 task 对象，过滤掉已经不存在的
  const pinnedTasks = focusPins.map(id => todayAll.find(t => t.id === id)).filter(Boolean);
  // 清理已不存在的 id（如被删除）
  if (pinnedTasks.length !== focusPins.length) {
    focusPins = pinnedTasks.map(t => t.id);
    saveFocusPins();
  }
  const empty = pinnedTasks.length === 0;
  const showHint = !focusHintSeen && empty;

  return `
    <div class="focus-block">
      <div class="focus-head">
        <h3 class="focus-title">今日专注</h3>
        ${pinnedTasks.length > 0 ? `<span class="focus-count">${pinnedTasks.length}/3</span>` : ''}
      </div>
      ${empty ? `
        <div class="focus-empty">
          <div class="focus-empty-text">今天想专注什么？</div>
          <button class="focus-smart-btn" onclick="smartRecommendFocus()">✦ 智能推荐</button>
        </div>
      ` : pinnedTasks.map(t => focusCardHTML(t)).join('')}
      ${showHint ? `<div class="focus-hint">每天选 3 件最重要的事，其余的慢慢来 🐌</div>` : ''}

}

function focusCardHTML(t) {
  // 复用 taskCardHTML，注入 📌 取消按钮到 task-actions 开头
  const html = taskCardHTML(t);
  return html.replace(
    '<div class="task-actions" onclick="event.stopPropagation()">',

 * Supabase 云同步层

function initSupabase() {
  if (sb) return true;
  if (!window.supabase || !window.supabase.createClient) return false;
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
    });
    return true;
  } catch(e) {
    console.warn('[Cloud] init failed:', e);
    return false;
  }
}

/* ---- 字段映射 ---- */
function taskToRow(t) {
  return {
    id: isUuid(t.id) ? t.id : uid(),
    user_id: cloudUser ? cloudUser.id : null,
    task_desc: t.desc || '',
    cat: t.cat || 'C',
    priority: t.priority || 'normal',
    task_date: t.date || todayStr(),
    deadline: t.deadline || null,
    start_time: t.startTime || null,
    dur_plan: t.durPlan || 60,
    dur_actual: t.durActual ?? null,
    notes: t.notes || '',
    favorited: !!t.favoriteId,
    recur_id: (t.recurId && isUuid(t.recurId)) ? t.recurId : null,
    is_recur: !!t.isRecur,
    rollover_count: t.rolloverCount || 0,
    updated_at: new Date().toISOString()
  };
}
function rowToTask(row) {
  return {
    id: row.id,
    desc: row.task_desc || '',
    cat: row.cat || 'C',
    priority: row.priority || 'normal',
    date: row.task_date,
    startTime: row.start_time || null,
    deadline: row.deadline || null,
    durPlan: row.dur_plan || 60,
    durActual: row.dur_actual ?? null,
    timerStart: null,
    timerPaused: 0,
    timerState: row.dur_actual != null ? 'done' : 'idle',
    rollover: false,
    recurId: row.recur_id || null,
    isRecur: !!row.is_recur,
    priorityManualOverride: false,
    deadlineUrgencyApplied: false,
    notes: row.notes || '',
    favoriteId: row.favorited ? row.id : null,
    rolloverCount: row.rollover_count || 0,
    originalDate: null,
    decomposed: false,
    sortOrder: null,
    _updatedAt: row.updated_at || null
  };
}
function tplToRow(tpl) {
  const freq = tpl.days && tpl.days.length === 7 ? 'daily' : 'weekly';
  return {
    id: isUuid(tpl.id) ? tpl.id : uid(),
    user_id: cloudUser ? cloudUser.id : null,
    template_desc: tpl.desc || '',
    cat: tpl.cat || 'C',
    freq,
    weekdays: Array.isArray(tpl.days) ? tpl.days : [],
    dur: tpl.durPlan || 60
  };
}
function rowToTpl(row) {
  return {
    id: row.id,
    desc: row.template_desc || '',
    cat: row.cat || 'C',
    priority: 'normal',
    durPlan: row.dur || 60,
    startTime: null,
    days: Array.isArray(row.weekdays) ? row.weekdays : (row.freq === 'daily' ? [0,1,2,3,4,5,6] : [1]),
    notes: '',
    createdAt: row.created_at ? row.created_at.slice(0,10) : todayStr()
  };
}

/* ---- 同步状态指示器 ---- */
function updateSyncIndicator() {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot ' + syncStatus;
  const titles = {
    idle: '点击同步',
    syncing: '同步中…',
    synced: '已同步',
    offline: '离线，待恢复后自动同步',
    error: '同步失败，点击重试'
  };
  dot.title = titles[syncStatus] || '同步';
}

/* ---- 推送：把当前 state 整体 upsert 到云端 ---- */
async function pushAllToCloud() {
  if (authStatus !== 'cloud' || !sb || !cloudUser) return;
  if (!navigator.onLine) { syncStatus = 'offline'; updateSyncIndicator(); return; }

  syncStatus = 'syncing'; updateSyncIndicator();

  try {
    // 只同步活跃任务和模板。state.done 是当日 UX，跨日重置，不进云端。
    const rows = state.tasks
      .filter(t => isUuid(t.id))
      .map(taskToRow);
    if (rows.length > 0) {
      const { error } = await sb.from('tasks').upsert(rows, { onConflict: 'id' });
      if (error) throw error;
    }
    // 循环模板
    const tplRows = state.recurTemplates
      .filter(tpl => isUuid(tpl.id))
      .map(tplToRow);
    if (tplRows.length > 0) {
      const { error: e2 } = await sb.from('recur_templates').upsert(tplRows, { onConflict: 'id' });
      if (e2) console.warn('[Cloud] tpl upsert:', e2);
    }
    syncStatus = 'synced';
  } catch(e) {
    console.warn('[Cloud] push failed:', e);
    syncStatus = 'error';
  }
  updateSyncIndicator();
}

function scheduleCloudSync() {
  if (authStatus !== 'cloud') return;
  if (!navigator.onLine) { syncStatus = 'offline'; updateSyncIndicator(); return; }
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(pushAllToCloud, 600);
}

/* ---- 拉取：合并云端任务到本地 ---- */
async function syncFromCloud() {
  if (authStatus !== 'cloud' || !sb || !cloudUser) return;
  syncStatus = 'syncing'; updateSyncIndicator();
  try {
    const { data: rows, error } = await sb
      .from('tasks')
      .select('*')
      .eq('user_id', cloudUser.id)
      .is('deleted_at', null);
    if (error) throw error;

    const { data: tplRows } = await sb
      .from('recur_templates')
      .select('*')
      .eq('user_id', cloudUser.id);

    mergeCloudTasks(rows || []);
    mergeCloudTemplates(tplRows || []);
    saveState({ skipCloudSync: true });
    render();
    syncStatus = 'synced';
  } catch(e) {
    console.warn('[Cloud] pull failed:', e);
    syncStatus = 'error';
  }
  updateSyncIndicator();
}

function mergeCloudTasks(rows) {
  const localById = {};
  state.tasks.forEach(t => { localById[t.id] = { arr: 'tasks', task: t }; });

  rows.forEach(row => {
    const cloudT = rowToTask(row);
    const found = localById[row.id];
    if (!found) {
      // 新任务，直接加入
      state.tasks.push(cloudT);
    } else {
      const local = found.task;
      const cloudUpd = new Date(row.updated_at || 0).getTime();
      const localUpd = new Date(local._updatedAt || 0).getTime();
      if (cloudUpd > localUpd) {
        Object.assign(local, cloudT);
      }
    }
  });
  // 云端已删除的任务（不在 rows 里）保留在本地，不强行删除，避免误删用户当前正在编辑的任务
}

function mergeCloudTemplates(rows) {
  const localIds = new Set(state.recurTemplates.map(t => t.id));
  rows.forEach(row => {
    if (!localIds.has(row.id)) {
      state.recurTemplates.push(rowToTpl(row));
    }
  });
}

/* ---- 软删除单个任务到云端 ---- */
async function cloudSoftDelete(taskId) {
  if (authStatus !== 'cloud' || !sb || !cloudUser) return;
  if (!isUuid(taskId)) return;
  if (!navigator.onLine) { syncStatus = 'offline'; updateSyncIndicator(); return; }
  try {
    await sb.from('tasks').update({ deleted_at: new Date().toISOString() }).eq('id', taskId);
  } catch(e) {
    console.warn('[Cloud] soft delete failed:', e);
  }
}

/* ---- Realtime 订阅 ---- */
async function bootRealtime() {
  if (!sb || !cloudUser) return;
  await teardownRealtime();
  realtimeChannel = sb
    .channel('tasks-sync-' + cloudUser.id)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'tasks',
      filter: `user_id=eq.${cloudUser.id}`
    }, handleRealtimeChange)
    .subscribe();
}
async function teardownRealtime() {
  if (realtimeChannel && sb) {
    try { await sb.removeChannel(realtimeChannel); } catch(_) {}
    realtimeChannel = null;
  }
}
function handleRealtimeChange(payload) {
  if (!payload) return;
  const ev = payload.eventType;
  if (ev === 'INSERT' || ev === 'UPDATE') {
    const row = payload.new;
    if (!row) return;
    if (row.deleted_at) {
      state.tasks = state.tasks.filter(t => t.id !== row.id);
      state.done = state.done.filter(t => t.id !== row.id);
    } else {
      const cloudT = rowToTask(row);
      const existing = findTask(row.id);
      if (existing) Object.assign(existing, cloudT);
      else state.tasks.push(cloudT);
    }
    saveState({ skipCloudSync: true });
    render();
  } else if (ev === 'DELETE') {
    const id = payload.old && payload.old.id;
    if (id) {
      state.tasks = state.tasks.filter(t => t.id !== id);
      state.done = state.done.filter(t => t.id !== id);
      saveState({ skipCloudSync: true });
      render();
    }
  }
}

/* ---- 认证 ---- */
async function bootAuth() {
  if (!initSupabase()) {
    // SDK 没加载成功 → 直接进入 guest 模式
    authStatus = 'guest';
    return;
  }
  try {
    const { data } = await sb.auth.getSession();
    if (data && data.session && data.session.user) {
      await enterCloudMode(data.session.user);
      return;
    }
  } catch(_) {}

  // 没有 session：看用户之前选择
  if (state.cloudPreference === 'guest') {
    authStatus = 'guest';
  } else {
    authStatus = 'unauth';
  }
}

async function loginWithEmail(email, password) {
  if (!sb) return { error: 'SDK 未加载' };
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return { error: error.message };
  if (data && data.user) await enterCloudMode(data.user);
  return { ok: true };
}

async function registerWithEmail(email, password) {
  if (!sb) return { error: 'SDK 未加载' };
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) return { error: error.message };
  if (data && data.user) {
    if (data.session) await enterCloudMode(data.user);
    else return { ok: true, needsConfirm: true };
  }
  return { ok: true };
}

async function enterCloudMode(user) {
  cloudUser = { id: user.id, email: user.email };
  authStatus = 'cloud';
  state.cloudUserEmail = user.email || '';
  state.cloudPreference = 'cloud';
  saveState({ skipCloudSync: true });
  hideAuthOverlay();
  syncStatus = 'syncing'; updateSyncIndicator();
  await checkMigration();
  await syncFromCloud();
  await bootRealtime();
  render();
}

function enterGuestMode() {
  authStatus = 'guest';
  state.cloudPreference = 'guest';
  saveState({ skipCloudSync: true });
  hideAuthOverlay();
  render();
}

async function logoutCloud() {
  if (!sb) return;
  await teardownRealtime();
  await sb.auth.signOut();
  cloudUser = null;
  authStatus = 'unauth';
  state.cloudUserEmail = '';
  state.cloudPreference = '';
  saveState({ skipCloudSync: true });
  showAuthOverlay();
  render();
}

async function checkMigration() {
  if (!cloudUser) return;
  const localActive = state.tasks.length;
  if (localActive === 0) return;
  // 看云端是否有该用户的任务
  try {
    const { count } = await sb
      .from('tasks')
      .select('id', { count: 'exact', head: true })
      .eq('user_id', cloudUser.id)
      .is('deleted_at', null);
    if ((count || 0) === 0) {
      // 云端为空，问用户是否上传本地数据
      const yes = confirm(`检测到本地有 ${localActive} 个任务，是否上传到云端开启同步？\n\n选「确定」上传\n选「取消」清空本地，使用云端（空）数据`);
      if (yes) {
        // 给非 UUID 的旧任务重新分配 UUID
        state.tasks.forEach(t => { if (!isUuid(t.id)) t.id = uid(); });
        state.recurTemplates.forEach(tpl => { if (!isUuid(tpl.id)) tpl.id = uid(); });
        await pushAllToCloud();
      } else {
        state.tasks = [];
        state.recurTemplates = [];
        saveState({ skipCloudSync: true });
      }
    }
  } catch(e) {
    console.warn('[Cloud] migration check failed:', e);
  }
}

function applyTheme() {

/* ---------------- 跨日处理 + 循环注入 + 截止升级 ---------------- */
function dailyTick() {
  const today = todayStr();
  const isCrossDay = state.lastDate && state.lastDate !== today;
  if (isCrossDay) {
    state.done = [];                                       // 清空昨日已完成
    state.tasks.forEach(t => { t.sortOrder = null; });     // AI 早间规划仅当日有效
    // 助手相关跨日重置（内存态）
    chatHistory = [];
    checkInMode = false;
    lastOperation = null;
  }
  state.lastDate = today;

  // 滚入：所有 date < today 且未完成的任务 → 移到今天 + rolloverCount += 1
  // 即使 dailyTick 同日内重跑，下次 t.date 已是 today，条件不再满足，不会双计数
  const _autoRealityTriggers = [];
  state.tasks.forEach(t => {
    if (t.date < today && t.timerState !== 'done') {
      if (!t.originalDate) t.originalDate = t.date;
      t.rolloverCount = (t.rolloverCount || 0) + 1;
      t.rollover = true;
      t.date = today;
      if (t.rolloverCount === 3 && !t.realityCheckShown) {
        t.realityCheckShown = true;
        _autoRealityTriggers.push(t.id);
      }
    }
  });
  if (_autoRealityTriggers.length > 0) {
    // 延迟到 DOM 准备好后再弹（首屏渲染后）
    setTimeout(() => {
      if (typeof chainRealityChecks === 'function') chainRealityChecks(_autoRealityTriggers);
    }, 800);
  }

  // 注入循环任务到未来 8 天
  for (let i = 0; i < 8; i++) {
    const targetDate = dateAdd(today, i);
    const wd = weekday(targetDate);
    state.recurTemplates.forEach(tpl => {
      if (!tpl.days.includes(wd)) return;
      // 是否已存在该实例
      const exists = state.tasks.some(t => t.recurId === tpl.id && t.date === targetDate);
      const doneKey = `${tpl.id}_${targetDate}`;
      if (exists || state.recurDoneLog[doneKey]) return;
      state.tasks.push(makeTask({
        desc: tpl.desc,
        cat: tpl.cat,
        priority: tpl.priority || 'normal',
        date: targetDate,
        startTime: tpl.startTime || null,
        durPlan: tpl.durPlan,
        recurId: tpl.id,
        isRecur: true
      }));
    });
  }

  // 截止升级：deadline ≤ 3 天的强制升紧急
  state.tasks.forEach(t => {
    if (!t.deadline) return;
    const d = diffDays(today, t.deadline);
    if (d <= 3 && !t.deadlineUrgencyApplied) {
      t.priority = 'urgent-important';
      t.deadlineUrgencyApplied = true;
    }
  });

  saveState();
}

/* ---------------- 任务工厂 ---------------- */
function makeTask(opts) {
  return {
    id: uid(),
    desc: opts.desc || '',
    cat: opts.cat || 'C',
    priority: opts.priority || 'normal',
    date: opts.date || todayStr(),
    startTime: opts.startTime || null,  // HH:MM 或 null
    timeLabel: opts.timeLabel || null,  // 模糊时间标签，如 "下午"，null 表示精确时间或无时间
    endTime: opts.endTime || null,      // 模糊时间区间结束，如 "18:00"
    createdAt: opts.createdAt || Date.now(),
    deadline: opts.deadline || null,
    durPlan: opts.durPlan || 60,
    durActual: opts.durActual ?? null,
    timerStart: null,
    timerPaused: 0,
    timerState: 'idle',
    rollover: false,
    recurId: opts.recurId || null,
    isRecur: !!opts.isRecur,
    priorityManualOverride: !!opts.priorityManualOverride,
    deadlineUrgencyApplied: false,
    notes: opts.notes || '',
    favoriteId: opts.favoriteId || null,
    rolloverCount: opts.rolloverCount || 0,    // 已被滚入次数（拖延天数）
    originalDate: opts.originalDate || null,   // 原始创建日期（rollover 前）
    decomposed: !!opts.decomposed,             // 是否已被 AI 拆解
    sortOrder: opts.sortOrder ?? null          // AI 早间规划排序（同优先级内排序更高）
  };
}

/* ---------------- 自然语言解析 ---------------- */
const CN_NUM = { '一':1,'二':2,'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'半':0.5 };
const CN_DIGIT = { '零':0,'〇':0,'一':1,'二':2,'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9 };
function cnToNum(s) {
  if (s == null) return null;
  s = String(s).trim();
  if (s === '') return null;
  if (/^\d+$/.test(s)) return parseInt(s, 10);
  if (s.length === 1 && CN_DIGIT[s] != null) return CN_DIGIT[s];
  if (s === '十') return 10;
  if (s.length === 2 && s[0] === '十' && CN_DIGIT[s[1]] != null) return 10 + CN_DIGIT[s[1]];          // 十一..十九
  if (s.length === 2 && s[1] === '十' && CN_DIGIT[s[0]] != null) return CN_DIGIT[s[0]] * 10;          // 二十,三十..
  if (s.length === 3 && s[1] === '十' && CN_DIGIT[s[0]] != null && CN_DIGIT[s[2]] != null)             // 二十一..五十九
    return CN_DIGIT[s[0]] * 10 + CN_DIGIT[s[2]];
  return null;
}

/* 模糊时间词映射（功能一） */
const FUZZY_TIME_MAP = {
  '早上': { startTime: '07:00', endTime: '09:00' },
  '早晨': { startTime: '07:00', endTime: '09:00' },
  '上午': { startTime: '09:00', endTime: '12:00' },
  '中午': { startTime: '11:30', endTime: '13:30' },
  '下午': { startTime: '14:00', endTime: '18:00' },
  '傍晚': { startTime: '17:00', endTime: '19:00' },
  '晚上': { startTime: '19:00', endTime: '22:00' },
  '睡前': { startTime: '22:00', endTime: '23:59' }
};
const FUZZY_TIME_RE = /(早晨|早上|上午|中午|下午|傍晚|晚上|睡前)/;

/* 解析开始时间，返回 { time: "HH:MM", matched: "原文匹配串", timeLabel?, endTime? } 或 null */
function parseStartTime(text) {
  // 1) 数字格式 HH:MM（可带时段前缀，用于 12 小时表达）
  let m = text.match(/(凌晨|早上|早晨|上午|中午|下午|傍晚|晚上|夜里|夜晚|深夜)?\s*(\d{1,2})\s*[:：]\s*(\d{1,2})/);
  if (m) {
    let h = parseInt(m[2], 10), min = parseInt(m[3], 10);
    if (h >= 0 && h <= 23 && min >= 0 && min <= 59) {
      h = applyPeriod(h, m[1]);
      return { time: pad2(h) + ':' + pad2(min), matched: m[0] };
    }
  }
  // 2) 中文：[时段?] [数字/中文数] 点(/时) [半|X分|X]?
  m = text.match(/(凌晨|早上|早晨|上午|中午|下午|傍晚|晚上|夜里|夜晚|深夜)?\s*([零〇一二两三四五六七八九十]{1,3}|\d{1,2})\s*[点时](?:\s*([零〇一二两三四五六七八九十]{1,3}|\d{1,2})\s*分?|\s*(半))?/);
  if (m) {
    let h = cnToNum(m[2]);
    if (h == null) return null;
    let min = 0;
    if (m[4] === '半') min = 30;
    else if (m[3]) {
      const mm = cnToNum(m[3]);
      if (mm != null && mm >= 0 && mm <= 59) min = mm;
    }
    h = applyPeriod(h, m[1]);
    if (h < 0 || h > 23) return null;
    return { time: pad2(h) + ':' + pad2(min), matched: m[0] };
  }
  // 3) 模糊时段词（无具体小时）— 映射到固定区间，并带 timeLabel
  m = text.match(FUZZY_TIME_RE);
  if (m) {
    const info = FUZZY_TIME_MAP[m[1]];
    if (info) {
      return {
        time: info.startTime,
        matched: m[0],
        timeLabel: m[1],
        endTime: info.endTime
      };
    }
  }
  return null;
}
function pad2(n) { return String(n).padStart(2, '0'); }
function applyPeriod(h, period) {
  if (!period) return h;
  if (period === '下午' || period === '傍晚' || period === '晚上' || period === '夜里' || period === '夜晚') {
    if (h < 12) h += 12;
  } else if (period === '中午') {
    if (h < 6) h += 12; // "中午1点" -> 13
    else if (h === 12) h = 12;
  } else if (period === '凌晨' || period === '深夜') {
    if (h === 12) h = 0;
  } else if (period === '早上' || period === '早晨' || period === '上午') {
    if (h === 12) h = 0;
  }
  return h;
}
function parseDuration(text) {
  // 返回分钟，未找到返回 null
  let m;
  // 1小时30分 / 1h30m
  m = text.match(/(\d+(?:\.\d+)?)\s*(?:小时|h)\s*(\d+)\s*(?:分钟|分|m)/i);
  if (m) return Math.round(parseFloat(m[1]) * 60 + parseInt(m[2]));
  // 1.5小时 / 2h
  m = text.match(/(\d+(?:\.\d+)?)\s*(?:小时|h(?![a-z]))/i);
  if (m) return Math.round(parseFloat(m[1]) * 60);
  // 30分钟 / 30m
  m = text.match(/(\d+)\s*(?:分钟|分|m(?!s))/i);
  if (m) return parseInt(m[1]);
  // 中文：两小时 / 半小时
  m = text.match(/(一|二|两|三|四|五|六|七|八|九|十|半)\s*(?:个)?\s*小时/);
  if (m) return Math.round(CN_NUM[m[1]] * 60);
  return null;
}
function parseDate(text) {
  const today = todayStr();
  if (/今天|今日/.test(text)) return today;
  if (/明天|明日/.test(text)) return dateAdd(today, 1);
  if (/后天/.test(text)) return dateAdd(today, 2);
  if (/大后天/.test(text)) return dateAdd(today, 3);
  let m = text.match(/(\d+)\s*天后/);
  if (m) return dateAdd(today, parseInt(m[1]));
  m = text.match(/下周([一二三四五六日天])/);
  if (m) {
    const target = m[1] === '日' || m[1] === '天' ? 0 : '一二三四五六'.indexOf(m[1]) + 1;
    const cur = weekday(today);
    let delta = 7 + (target - cur);
    if (delta > 13) delta -= 7;
    if (delta <= 7) delta += 7;
    return dateAdd(today, delta);
  }
  m = text.match(/(?:这周|本周)?([一二三四五六日天])/);
  if (m && /(?:这周|本周|周)/.test(text)) {
    const target = m[1] === '日' || m[1] === '天' ? 0 : '一二三四五六'.indexOf(m[1]) + 1;
    const cur = weekday(today);
    let delta = (target - cur + 7) % 7;
    if (delta === 0) delta = 7;
    return dateAdd(today, delta);
  }
  m = text.match(/(\d+)\s*月\s*(\d+)\s*[日号]/);
  if (m) {
    const now = new Date();
    let d = new Date(now.getFullYear(), parseInt(m[1])-1, parseInt(m[2]));
    if (d < now && d.toDateString() !== now.toDateString()) d.setFullYear(d.getFullYear()+1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  return null;
}
function parseDeadline(text) {
  const m = text.match(/(?:截止|deadline|ddl)\s*[:：]?\s*([^,，、。]+)/i);
  if (!m) return null;
  return parseDate(m[1]);
}
function parseCategory(text) {
  // 关键词分类
  if (/学习\s*[一-龥]+/.test(text) && !/听课|抄作业|刷题|听讲座/.test(text)) {
    // 仅当明确说 学习xxx 才归 S
    return 'S';
  }
  if (/(论文|实验|文献|导师|组会|paper|research)/i.test(text)) return 'R';
  if (/(游泳|健身|跑步|阅读|读书|冥想|瑜伽|散步|锻炼|运动)/.test(text)) return 'G';
  return 'C';
}
function parseRecur(text) {
  // 每天xxx / 每周一三五xxx
  let m = text.match(/每天\s*(.+)/);
  if (m) return { days: [0,1,2,3,4,5,6], desc: m[1].trim() };
  m = text.match(/每(?:周|个星期)([一二三四五六日天]+)\s*(.+)/);
  if (m) {
    const dayChars = m[1].split('');
    const days = dayChars.map(c => c === '日' || c === '天' ? 0 : '一二三四五六'.indexOf(c) + 1).filter(d => d >= 0);
    return { days, desc: m[2].trim() };
  }
  m = text.match(/每周\s*(.+)/);
  if (m) return { days: [1], desc: m[1].trim() };
  return null;
}
function parseSegments(text) {
  return text.split(/[,，、]|然后|接着|再/).map(s => s.trim()).filter(Boolean);
}
/**
 * 优先级判定规则（彻底重写，2026-05-27）：
 *   第一步：重要性
 *     desc 含 论文/作业/报告/考试/答辩/项目/实验/文献/提交/交/due/deadline/ddl → 重要
 *   第二步：紧急性，满足任一即紧急
 *     - date 是今天或明天
 *     - 距离 deadline ≤ 3 天
 *     - desc 含 今天/明天/马上/立刻/紧急/尽快/截止
 *   第三步：组合
 *     重要+紧急→红 / 重要→蓝 / 紧急→橙 / 都不→默认
 *   第四步：默认 important（蓝）——宁可高估也不低估
 */
const IMPORTANT_KW = /论文|作业|报告|考试|答辩|项目|实验|文献|提交|交|due|deadline|ddl/i;
const URGENT_KW = /今天|明天|马上|立刻|紧急|尽快|截止/;

function inferPriority(desc, deadline, date, startTime) {
  const today = todayStr();
  const tomorrow = dateAdd(today, 1);

  let important = false, urgent = false;

  if (IMPORTANT_KW.test(desc || '')) important = true;
  if (URGENT_KW.test(desc || '')) urgent = true;

  if (date === today || date === tomorrow) urgent = true;

  if (deadline) {
    const d = diffDays(today, deadline);
    if (d <= 3) urgent = true;
    // deadline 7 天内也视为重要（弱触发，便于早动手）
    if (d <= 7) important = true;
  }

  if (urgent && important) return 'urgent-important';
  if (urgent) return 'urgent-unimportant';
  if (important) return 'important';
  // 第四步：无法判断时默认 important（蓝），而不是 normal
  return 'important';
}
function estimateDuration(desc) {
  // 简单启发
  if (/(吃饭|喝水|休息)/.test(desc)) return 30;
  if (/(会议|组会|课)/.test(desc)) return 90;
  if (/(写|阅读|学习|论文|实验)/.test(desc)) return 90;
  if (/(健身|跑步|游泳|锻炼)/.test(desc)) return 60;
  return 60;
}
function parseTaskText(text) {
  // 检测循环
  const recur = parseRecur(text);
  if (recur) {
    const startTimeInfo = parseStartTime(recur.desc);
    const dur = parseDuration(recur.desc) || 60;
    let working = recur.desc;
    if (startTimeInfo) working = working.replace(startTimeInfo.matched, '');
    const cleanDesc = working
      .replace(/(\d+(?:\.\d+)?)\s*(?:小时|h)(?:\s*\d+\s*(?:分钟|分|m))?/gi, '')
      .replace(/(\d+)\s*(?:分钟|分|m(?!s))/gi, '')
      .replace(/(一|二|两|三|四|五|六|七|八|九|十|半)\s*(?:个)?\s*小时/g, '')
      .trim();
    return [{
      type: 'recur',
      desc: cleanDesc || recur.desc,
      days: recur.days,
      durPlan: dur,
      startTime: startTimeInfo ? startTimeInfo.time : null,
      cat: parseCategory(cleanDesc),
      priority: 'normal'
    }];
  }
  // 多任务
  const segs = parseSegments(text);
  return segs.map(seg => {
    const startTimeInfo = parseStartTime(seg);
    const dur = parseDuration(seg);
    const date = parseDate(seg) || todayStr();
    const deadline = parseDeadline(seg);
    let working = seg;
    if (startTimeInfo) working = working.replace(startTimeInfo.matched, '');
    const cat = parseCategory(working);
    const cleanDesc = working
      .replace(/截止[^,，、。]+/, '')
      .replace(/deadline[^,，、。]+/i, '')
      .replace(/今天|明天|后天|大后天|下周[一二三四五六日天]|本周[一二三四五六日天]|这周[一二三四五六日天]|\d+天后|\d+月\d+[日号]/g, '')
      .replace(/(\d+(?:\.\d+)?)\s*(?:小时|h)(?:\s*\d+\s*(?:分钟|分|m))?/gi, '')
      .replace(/(\d+)\s*(?:分钟|分|m(?!s))/gi, '')
      .replace(/(一|二|两|三|四|五|六|七|八|九|十|半)\s*(?:个)?\s*小时/g, '')
      .trim();
    const finalDesc = cleanDesc || seg;
    return {
      type: 'task',
      desc: finalDesc,
      durPlan: dur,
      needConfirmDur: dur == null,
      estimatedDur: dur == null ? estimateDuration(finalDesc) : null,
      date,
      startTime: startTimeInfo ? startTimeInfo.time : null,
      timeLabel: startTimeInfo ? (startTimeInfo.timeLabel || null) : null,
      endTime: startTimeInfo ? (startTimeInfo.endTime || null) : null,
      deadline,
      cat,
      priority: inferPriority(finalDesc, deadline, date, startTimeInfo ? startTimeInfo.time : null)
    };
  });
}
